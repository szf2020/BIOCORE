<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#122040"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg8)"/>
  <rect x="0" y="0" width="1280" height="4" fill="#22c55e"/>

  <!-- Part indicator -->
  <rect x="80" y="24" width="8" height="30" rx="2" fill="#22c55e"/>
  <text x="100" y="45" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#4a6080">第二部分 | 本地 AI 智能模块</text>

  <!-- Page title -->
  <text x="80" y="85" font-family="Microsoft YaHei, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">AI 安全哲学 — 建议缓冲区</text>
  <text x="80" y="112" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#7a8faa">AI 是顾问，不是操作员 — Human-in-the-Loop</text>
  <rect x="80" y="122" width="80" height="2" fill="#22c55e" rx="1"/>

  <!-- Central Flow Diagram -->
  <g transform="translate(640, 340)">
    <!-- Step 1: AI Engine -->
    <rect x="-520" y="-80" width="180" height="80" rx="10" fill="#1a2744" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="-430" y="-48" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#8b5cf6">AI 推理引擎</text>
    <text x="-430" y="-28" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">Ollama + Qwen2.5</text>
    <text x="-430" y="-10" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">CUSUM/DTW/Monod</text>

    <!-- Arrow 1 -->
    <line x1="-340" y1="-40" x2="-270" y2="-40" stroke="#5a7090" stroke-width="2"/>
    <polygon points="-270,-40 -280,-46 -280,-34" fill="#5a7090"/>
    <text x="-305" y="-50" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#4a6080">生成</text>

    <!-- Step 2: Suggestion -->
    <rect x="-270" y="-80" width="180" height="80" rx="10" fill="#1a2744" stroke="#22c55e" stroke-width="1.5"/>
    <text x="-180" y="-52" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#22c55e">建议内容</text>
    <text x="-180" y="-32" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">参数值 + 置信度</text>
    <text x="-180" y="-12" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">+ 推理依据</text>

    <!-- Arrow 2 -->
    <line x1="-90" y1="-40" x2="-20" y2="-40" stroke="#5a7090" stroke-width="2"/>
    <polygon points="-20,-40 -30,-46 -30,-34" fill="#5a7090"/>
    <text x="-55" y="-50" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#4a6080">写入</text>

    <!-- Step 3: Buffer (highlighted) -->
    <rect x="-20" y="-90" width="200" height="100" rx="10" fill="#1a2744" stroke="#f59e0b" stroke-width="2"/>
    <text x="80" y="-58" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#f59e0b">建议缓冲区</text>
    <rect x="20" y="-42" width="120" height="24" rx="4" fill="#f59e0b" opacity="0.15"/>
    <text x="80" y="-25" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" fill="#f59e0b">PENDING</text>
    <text x="80" y="-5" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">不执行，等待审核</text>

    <!-- Arrow 3 -->
    <line x1="180" y1="-40" x2="250" y2="-40" stroke="#5a7090" stroke-width="2"/>
    <polygon points="250,-40 240,-46 240,-34" fill="#5a7090"/>
    <text x="215" y="-50" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#4a6080">展示</text>

    <!-- Step 4: Operator -->
    <rect x="250" y="-80" width="160" height="80" rx="10" fill="#1a2744" stroke="#1677ff" stroke-width="2"/>
    <text x="330" y="-48" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#1677ff">操作员审核</text>
    <text x="330" y="-25" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#22c55e">Accept</text>
    <text x="330" y="-10" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#ef4444">Reject</text>

    <!-- Arrow Accept -> PLC -->
    <line x1="410" y1="-55" x2="470" y2="-55" stroke="#22c55e" stroke-width="2"/>
    <polygon points="470,-55 460,-61 460,-49" fill="#22c55e"/>

    <!-- Step 5: PLC -->
    <rect x="470" y="-80" width="120" height="50" rx="8" fill="#1a2744" stroke="#22c55e" stroke-width="1.5"/>
    <text x="530" y="-50" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#22c55e">写入 PLC</text>

    <!-- Arrow Reject -> Log -->
    <line x1="410" y1="-25" x2="470" y2="-25" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="470,-25 460,-31 460,-19" fill="#ef4444"/>

    <rect x="470" y="-45" width="120" height="50" rx="8" fill="#1a2744" stroke="#ef4444" stroke-width="1"/>
    <text x="530" y="-16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#ef4444">记录日志</text>

    <!-- RED X: AI does NOT connect to PLC directly -->
    <g transform="translate(-430, 40)">
      <line x1="0" y1="0" x2="1050" y2="0" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
      <rect x="380" y="-14" width="280" height="28" rx="6" fill="#2a1020" stroke="#ef4444" stroke-width="1"/>
      <text x="520" y="5" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#ef4444">AI 永不直接控制 PLC</text>
    </g>
  </g>

  <!-- Audit trail note -->
  <g transform="translate(80, 480)">
    <rect x="0" y="0" width="1120" height="45" rx="8" fill="#1a2744" stroke="#3a5070" stroke-width="0.5"/>
    <text x="20" y="18" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#b0c4e8">不可篡改审计日志</text>
    <text x="20" y="36" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#5a7090">每次 Accept/Reject 操作均记录：操作员 ID / 时间戳 / 建议内容 / 置信度 / 决策结果 — 触发器禁止 UPDATE/DELETE</text>
  </g>

  <!-- Comparison -->
  <g transform="translate(80, 545)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#b0c4e8">设计哲学对比</text>

    <rect x="0" y="15" width="540" height="55" rx="8" fill="#1a2744" stroke="#ef4444" stroke-width="1"/>
    <rect x="0" y="15" width="5" height="55" rx="2" fill="#ef4444"/>
    <text x="20" y="38" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#ef4444">竞品模式</text>
    <text x="120" y="38" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7a8faa">云端 AI 全自动闭环控制 — 延迟高、数据外泄风险</text>
    <text x="20" y="58" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#5a7090">AI 直连执行层，无人工确认环节</text>

    <rect x="580" y="15" width="540" height="55" rx="8" fill="#1a2744" stroke="#22c55e" stroke-width="1"/>
    <rect x="580" y="15" width="5" height="55" rx="2" fill="#22c55e"/>
    <text x="600" y="38" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#22c55e">BIOCore 模式</text>
    <text x="720" y="38" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7a8faa">本地 AI 建议 + 人工确认 — 安全可控</text>
    <text x="600" y="58" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#5a7090">Human-in-the-Loop，AI 辅助决策不替代决策</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#0d1a2e"/>
  <text x="80" y="706" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#4a6080">BIOCore 实验室发酵罐智能控制平台</text>
  <text x="640" y="706" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#3a5070">AI 安全哲学</text>
  <text x="1200" y="706" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#4a6080">08 / 18</text>
</svg>