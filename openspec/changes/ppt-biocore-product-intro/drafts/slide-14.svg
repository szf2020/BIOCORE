<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg14" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#122040"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg14)"/>
  <rect x="0" y="0" width="1280" height="4" fill="#8b5cf6"/>

  <!-- Part indicator -->
  <rect x="80" y="24" width="8" height="30" rx="2" fill="#8b5cf6"/>
  <text x="100" y="45" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#4a6080">第四部分 | 实验设计、竞争优势与商业价值</text>

  <!-- Page title -->
  <text x="80" y="85" font-family="Microsoft YaHei, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">实验设计与贝叶斯优化</text>
  <text x="80" y="112" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#7a8faa">7 种 DoE 方法 + 高斯过程优化 — 实验次数减半</text>
  <rect x="80" y="122" width="80" height="2" fill="#8b5cf6" rx="1"/>

  <!-- Metrics -->
  <g transform="translate(600, 30)">
    <rect x="0" y="0" width="130" height="50" rx="8" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
    <text x="65" y="24" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" font-weight="bold" fill="#8b5cf6">7</text>
    <text x="65" y="42" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">DoE 方法</text>

    <rect x="145" y="0" width="130" height="50" rx="8" fill="#1a2744" stroke="#22c55e" stroke-width="1"/>
    <text x="210" y="24" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" font-weight="bold" fill="#22c55e">~50%</text>
    <text x="210" y="42" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">实验减少</text>
  </g>

  <!-- Left column: 7 DoE methods -->
  <g transform="translate(80, 145)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#b0c4e8">7 种实验设计方法</text>

    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="250" height="34" rx="6" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
      <text x="15" y="22" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#8b5cf6">全因子设计</text>
      <text x="135" y="22" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">Full Factorial</text>

      <rect x="265" y="0" width="250" height="34" rx="6" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
      <text x="280" y="22" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#8b5cf6">中心复合设计</text>
      <text x="395" y="22" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">CCD</text>

      <rect x="0" y="42" width="250" height="34" rx="6" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
      <text x="15" y="64" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#8b5cf6">拉丁超立方</text>
      <text x="135" y="64" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">LHS</text>

      <rect x="265" y="42" width="250" height="34" rx="6" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
      <text x="280" y="64" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#8b5cf6">Plackett-Burman</text>
      <text x="430" y="64" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">筛选</text>

      <rect x="0" y="84" width="250" height="34" rx="6" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
      <text x="15" y="106" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#8b5cf6">Box-Behnken</text>
      <text x="155" y="106" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">响应曲面</text>

      <rect x="265" y="84" width="250" height="34" rx="6" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
      <text x="280" y="106" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#8b5cf6">确定性筛选</text>
      <text x="395" y="106" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">DSD</text>

      <rect x="0" y="126" width="250" height="34" rx="6" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
      <text x="15" y="148" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#8b5cf6">分数因子</text>
      <text x="135" y="148" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">Fractional</text>
    </g>

    <!-- Analysis tools -->
    <g transform="translate(0, 195)">
      <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#b0c4e8">分析工具</text>
      <g transform="translate(0, 15)">
        <rect x="0" y="0" width="100" height="26" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
        <text x="50" y="17" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">极差分析</text>
        <rect x="110" y="0" width="100" height="26" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
        <text x="160" y="17" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">ANOVA</text>
        <rect x="220" y="0" width="100" height="26" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
        <text x="270" y="17" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">响应曲面</text>
        <rect x="330" y="0" width="100" height="26" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
        <text x="380" y="17" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">田口信噪比</text>
      </g>
    </g>
  </g>

  <!-- Right column: Bayesian optimization convergence -->
  <g transform="translate(640, 145)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#b0c4e8">贝叶斯优化收敛曲线</text>

    <!-- Chart area -->
    <rect x="0" y="18" width="560" height="220" rx="8" fill="#111a2a" stroke="#1e2d45" stroke-width="1"/>

    <!-- Axes -->
    <line x1="50" y1="38" x2="50" y2="215" stroke="#2a3a50" stroke-width="1"/>
    <line x1="50" y1="215" x2="530" y2="215" stroke="#2a3a50" stroke-width="1"/>
    <text x="20" y="130" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#4a6080" transform="rotate(-90, 20, 130)">目标函数值</text>
    <text x="290" y="235" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#4a6080">实验次数</text>

    <!-- CCD line (slower convergence, more experiments) -->
    <polyline points="60,190 100,175 150,160 200,150 250,142 300,135 350,130 400,126 450,123 500,120" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>

    <!-- Bayesian line (fast convergence) -->
    <polyline points="60,185 100,155 150,125 200,95 250,72 300,60 350,55 400,53 450,52 500,52" fill="none" stroke="#22c55e" stroke-width="2"/>

    <!-- Convergence marker -->
    <circle cx="300" cy="60" r="5" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="315" y="55" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#22c55e">~10 次收敛</text>

    <circle cx="500" cy="120" r="5" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <text x="450" y="110" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#ef4444">~25 次</text>

    <!-- Legend -->
    <line x1="70" y1="35" x2="100" y2="35" stroke="#22c55e" stroke-width="2"/>
    <text x="108" y="39" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#22c55e">贝叶斯 (GP + UCB)</text>
    <line x1="280" y1="35" x2="310" y2="35" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="318" y="39" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#ef4444">CCD 传统</text>
  </g>

  <!-- Multi-fidelity workflow -->
  <g transform="translate(640, 390)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#b0c4e8">多保真度四阶段工作流</text>

    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="120" height="45" rx="6" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
      <text x="60" y="20" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#8b5cf6">摇瓶筛选</text>
      <text x="60" y="36" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#5a7090">低成本</text>

      <line x1="120" y1="22" x2="145" y2="22" stroke="#3a5070" stroke-width="1.5"/>
      <polygon points="145,22 139,17 139,27" fill="#3a5070"/>

      <rect x="145" y="0" width="120" height="45" rx="6" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
      <text x="205" y="20" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#8b5cf6">小型罐验证</text>
      <text x="205" y="36" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#5a7090">中等成本</text>

      <line x1="265" y1="22" x2="290" y2="22" stroke="#3a5070" stroke-width="1.5"/>
      <polygon points="290,22 284,17 284,27" fill="#3a5070"/>

      <rect x="290" y="0" width="120" height="45" rx="6" fill="#1a2744" stroke="#22c55e" stroke-width="1.5"/>
      <text x="350" y="20" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#22c55e">贝叶斯收敛</text>
      <text x="350" y="36" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#5a7090">智能迭代</text>

      <line x1="410" y1="22" x2="435" y2="22" stroke="#3a5070" stroke-width="1.5"/>
      <polygon points="435,22 429,17 429,27" fill="#3a5070"/>

      <rect x="435" y="0" width="120" height="45" rx="6" fill="#1a2744" stroke="#f59e0b" stroke-width="1"/>
      <text x="495" y="20" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">确认实验</text>
      <text x="495" y="36" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#5a7090">最终验证</text>
    </g>
  </g>

  <!-- Case study comparison -->
  <g transform="translate(80, 470)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#b0c4e8">典型案例: 4 因素优化</text>

    <rect x="0" y="15" width="540" height="55" rx="8" fill="#1a2744" stroke="#ef4444" stroke-width="1"/>
    <text x="15" y="38" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#ef4444">全因子设计</text>
    <text x="160" y="38" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#ef4444">81 次实验</text>
    <text x="310" y="38" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7a8faa">20+ 周</text>
    <!-- Bar -->
    <rect x="15" y="48" width="510" height="8" rx="4" fill="#ef4444" opacity="0.2"/>
    <rect x="15" y="48" width="510" height="8" rx="4" fill="#ef4444" opacity="0.4"/>

    <rect x="0" y="80" width="540" height="55" rx="8" fill="#1a2744" stroke="#22c55e" stroke-width="1.5"/>
    <text x="15" y="103" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#22c55e">BIOCore 优化</text>
    <text x="160" y="103" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#22c55e">47 次实验</text>
    <text x="310" y="103" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7a8faa">14 周</text>
    <!-- Bar -->
    <rect x="15" y="113" width="510" height="8" rx="4" fill="#22c55e" opacity="0.1"/>
    <rect x="15" y="113" width="296" height="8" rx="4" fill="#22c55e" opacity="0.4"/>
  </g>

  <!-- SPC note -->
  <g transform="translate(640, 470)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#b0c4e8">SPC 控制图</text>
    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="260" height="28" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="130" y="18" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">X-bar / R 图</text>
      <rect x="270" y="0" width="260" height="28" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="400" y="18" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">EWMA + Cp/Cpk</text>
    </g>
    <text x="0" y="65" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#5a7090">Western Electric 规则自动检测过程异常</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#0d1a2e"/>
  <text x="80" y="706" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#4a6080">BIOCore 实验室发酵罐智能控制平台</text>
  <text x="640" y="706" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#3a5070">实验设计与贝叶斯优化</text>
  <text x="1200" y="706" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#4a6080">14 / 18</text>
</svg>