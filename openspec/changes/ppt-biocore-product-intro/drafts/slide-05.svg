<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#122040"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg5)"/>
  <rect x="0" y="0" width="1280" height="4" fill="#1677ff"/>

  <!-- Part indicator -->
  <rect x="80" y="24" width="8" height="30" rx="2" fill="#1677ff"/>
  <text x="100" y="45" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#4a6080">第一部分 | 工业级硬件底座与安全体系</text>

  <!-- Page title -->
  <text x="80" y="85" font-family="Microsoft YaHei, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">ISA-88 批次控制引擎</text>
  <text x="80" y="112" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#7a8faa">6 状态机 + 14 种 Phase + 3 种执行模式</text>
  <rect x="80" y="122" width="80" height="2" fill="#1677ff" rx="1"/>

  <!-- Hero: State Machine Diagram -->
  <g transform="translate(100, 150)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#b0c4e8">ISA-88 六状态转换图</text>

    <!-- Idle -->
    <rect x="0" y="30" width="120" height="50" rx="25" fill="#1a2744" stroke="#7a8faa" stroke-width="1.5"/>
    <text x="60" y="60" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#7a8faa">Idle 闲置</text>

    <!-- Arrow Idle -> Running -->
    <line x1="120" y1="55" x2="190" y2="55" stroke="#22c55e" stroke-width="1.5"/>
    <polygon points="190,55 183,50 183,60" fill="#22c55e"/>

    <!-- Running -->
    <rect x="190" y="30" width="130" height="50" rx="25" fill="#1a2744" stroke="#22c55e" stroke-width="2"/>
    <text x="255" y="60" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#22c55e">Running 运行</text>

    <!-- Arrow Running -> Complete -->
    <line x1="320" y1="55" x2="400" y2="55" stroke="#1677ff" stroke-width="1.5"/>
    <polygon points="400,55 393,50 393,60" fill="#1677ff"/>

    <!-- Complete -->
    <rect x="400" y="30" width="140" height="50" rx="25" fill="#1a2744" stroke="#1677ff" stroke-width="1.5"/>
    <text x="470" y="60" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#1677ff">Complete 完成</text>

    <!-- Paused (below Running) -->
    <line x1="255" y1="80" x2="255" y2="115" stroke="#f59e0b" stroke-width="1.5"/>
    <polygon points="255,115 250,108 260,108" fill="#f59e0b"/>
    <rect x="190" y="115" width="130" height="50" rx="25" fill="#1a2744" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="255" y="145" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#f59e0b">Paused 暂停</text>

    <!-- Held (below-right) -->
    <line x1="320" y1="140" x2="400" y2="140" stroke="#ef4444" stroke-width="1.5"/>
    <polygon points="400,140 393,135 393,145" fill="#ef4444"/>
    <rect x="400" y="115" width="130" height="50" rx="25" fill="#1a2744" stroke="#ef4444" stroke-width="2"/>
    <text x="465" y="145" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#ef4444">Held 保持</text>
    <text x="465" y="175" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#ef4444">故障/心跳断开</text>

    <!-- Stopped -->
    <line x1="465" y1="165" x2="465" y2="200" stroke="#7a8faa" stroke-width="1.5"/>
    <polygon points="465,200 460,193 470,193" fill="#7a8faa"/>
    <rect x="400" y="200" width="130" height="50" rx="25" fill="#1a2744" stroke="#7a8faa" stroke-width="1.5"/>
    <text x="465" y="230" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#7a8faa">Stopped 停止</text>

    <!-- Reset arrow from Complete/Stopped back to Idle -->
    <path d="M 400,80 Q 60,180 60,80" fill="none" stroke="#4a6080" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="180" y="110" font-family="JetBrains Mono, monospace" font-size="10" fill="#4a6080">Reset</text>

    <!-- XState label -->
    <rect x="600" y="30" width="180" height="36" rx="6" fill="#162030" stroke="#8b5cf6" stroke-width="1"/>
    <text x="690" y="54" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#8b5cf6">XState v5 状态机</text>
    <text x="600" y="85" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#5a7090">确定性状态转换</text>
    <text x="600" y="102" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#5a7090">完整可审计日志</text>
  </g>

  <!-- Metrics row -->
  <g transform="translate(870, 160)">
    <rect x="0" y="0" width="120" height="70" rx="8" fill="#1a2744" stroke="#1677ff" stroke-width="1"/>
    <text x="60" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="24" font-weight="bold" fill="#1677ff">14</text>
    <text x="60" y="50" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">Phase 类型</text>

    <rect x="140" y="0" width="120" height="70" rx="8" fill="#1a2744" stroke="#22c55e" stroke-width="1"/>
    <text x="200" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="24" font-weight="bold" fill="#22c55e">3</text>
    <text x="200" y="50" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">执行模式</text>

    <rect x="280" y="0" width="120" height="70" rx="8" fill="#1a2744" stroke="#f59e0b" stroke-width="1"/>
    <text x="340" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="24" font-weight="bold" fill="#f59e0b">6</text>
    <text x="340" y="50" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">状态机</text>
  </g>

  <!-- 14 Phase grid -->
  <g transform="translate(80, 430)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#b0c4e8">14 种 Phase 类型</text>

    <!-- Category: System -->
    <rect x="0" y="20" width="70" height="24" rx="4" fill="#1677ff" opacity="0.2"/>
    <text x="35" y="37" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#1677ff">系统操作</text>
    <g transform="translate(80, 20)">
      <rect x="0" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="48" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">准备</text>
      <rect x="105" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="153" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">加水</text>
      <rect x="210" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="258" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">手动加料</text>
      <rect x="315" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="363" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">排液</text>
    </g>

    <!-- Category: Temp -->
    <rect x="0" y="52" width="70" height="24" rx="4" fill="#f59e0b" opacity="0.2"/>
    <text x="35" y="69" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#f59e0b">温控</text>
    <g transform="translate(80, 52)">
      <rect x="0" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="48" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">升温</text>
      <rect x="105" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="153" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">温度控制</text>
    </g>

    <!-- Category: Process -->
    <rect x="0" y="84" width="70" height="24" rx="4" fill="#22c55e" opacity="0.2"/>
    <text x="35" y="101" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#22c55e">过程控制</text>
    <g transform="translate(80, 84)">
      <rect x="0" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="48" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">搅拌</text>
      <rect x="105" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="153" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">补料</text>
      <rect x="210" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="258" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">pH 控制</text>
    </g>

    <!-- Category: Fermentation -->
    <rect x="0" y="116" width="70" height="24" rx="4" fill="#8b5cf6" opacity="0.2"/>
    <text x="35" y="133" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#8b5cf6">发酵主体</text>
    <g transform="translate(80, 116)">
      <rect x="0" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="48" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">Batch 培养</text>
      <rect x="105" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="153" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">Fed-batch</text>
      <rect x="210" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="258" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">诱导表达</text>
    </g>

    <!-- Category: CIP/SIP -->
    <rect x="0" y="148" width="70" height="24" rx="4" fill="#ef4444" opacity="0.2"/>
    <text x="35" y="165" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#ef4444">清洗灭菌</text>
    <g transform="translate(80, 148)">
      <rect x="0" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="48" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">SIP 灭菌</text>
      <rect x="105" y="0" width="95" height="24" rx="4" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
      <text x="153" y="16" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">CIP 清洗</text>
    </g>
  </g>

  <!-- 3 Execution modes -->
  <g transform="translate(680, 430)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#b0c4e8">3 种执行模式</text>

    <rect x="0" y="20" width="500" height="55" rx="8" fill="#1a2744" stroke="#22c55e" stroke-width="1"/>
    <text x="20" y="45" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#22c55e">顺序模式</text>
    <text x="120" y="45" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7a8faa">成熟工艺自动推进 Phase 序列</text>
    <text x="20" y="62" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#4a6080">适用：标准化生产</text>

    <rect x="0" y="85" width="500" height="55" rx="8" fill="#1a2744" stroke="#f59e0b" stroke-width="1"/>
    <text x="20" y="110" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#f59e0b">自由模式</text>
    <text x="120" y="110" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7a8faa">操作员手动选择下一 Phase</text>
    <text x="20" y="127" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#4a6080">适用：工艺摸索/研发</text>

    <rect x="0" y="150" width="500" height="55" rx="8" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
    <text x="20" y="175" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#8b5cf6">DAG 分支模式</text>
    <text x="140" y="175" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7a8faa">条件路由自动选择分支路径</text>
    <text x="20" y="192" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#4a6080">适用：复杂条件决策</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#0d1a2e"/>
  <text x="80" y="706" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#4a6080">BIOCore 实验室发酵罐智能控制平台</text>
  <text x="640" y="706" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#3a5070">ISA-88 批次控制引擎</text>
  <text x="1200" y="706" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#4a6080">05 / 18</text>
</svg>