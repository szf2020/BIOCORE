<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#122040"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg12)"/>
  <rect x="0" y="0" width="1280" height="4" fill="#f59e0b"/>

  <!-- Part indicator -->
  <rect x="80" y="24" width="8" height="30" rx="2" fill="#f59e0b"/>
  <text x="100" y="45" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#4a6080">第三部分 | 数据架构与开放生态</text>

  <!-- Page title -->
  <text x="80" y="85" font-family="Microsoft YaHei, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">现代化 Web 前端</text>
  <text x="80" y="112" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#7a8faa">14 个功能页面 — 深色工业主题 + 实时仪表盘</text>
  <rect x="80" y="122" width="80" height="2" fill="#f59e0b" rx="1"/>

  <!-- Metrics row -->
  <g transform="translate(600, 30)">
    <rect x="0" y="0" width="130" height="50" rx="8" fill="#1a2744" stroke="#f59e0b" stroke-width="1"/>
    <text x="65" y="24" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" font-weight="bold" fill="#f59e0b">14</text>
    <text x="65" y="42" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">功能页面</text>

    <rect x="145" y="0" width="130" height="50" rx="8" fill="#1a2744" stroke="#1677ff" stroke-width="1"/>
    <text x="210" y="24" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" font-weight="bold" fill="#1677ff">&lt;3s</text>
    <text x="210" y="42" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">首屏加载</text>
  </g>

  <!-- Tech stack bar -->
  <g transform="translate(80, 135)">
    <rect x="0" y="0" width="1120" height="30" rx="6" fill="#162030" stroke="#1e2d45" stroke-width="0.5"/>
    <text x="15" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#1677ff">Next.js 14</text>
    <text x="130" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#1677ff">React 18</text>
    <text x="230" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#22c55e">shadcn/ui</text>
    <text x="340" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#22c55e">Tailwind CSS</text>
    <text x="480" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#f59e0b">ECharts</text>
    <text x="580" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#f59e0b">@xyflow/react</text>
    <text x="730" y="20" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#5a7090">深色 MES 主题 #141414 + #1677ff</text>
    <text x="1000" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#5a7090">JetBrains Mono</text>
  </g>

  <!-- Mixed grid: 6 UI mockup cards -->
  <!-- Row 1: 3 cards -->
  <g transform="translate(80, 180)">
    <!-- Card 1: Dashboard -->
    <rect x="0" y="0" width="360" height="210" rx="8" fill="#111a2a" stroke="#1677ff" stroke-width="1"/>
    <rect x="0" y="0" width="360" height="30" rx="8" fill="#1e2d45"/>
    <rect x="0" y="20" width="360" height="10" fill="#1e2d45"/>
    <circle cx="15" cy="15" r="4" fill="#ef4444"/>
    <circle cx="30" cy="15" r="4" fill="#f59e0b"/>
    <circle cx="45" cy="15" r="4" fill="#22c55e"/>
    <text x="180" y="19" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">Dashboard 主控制台</text>
    <!-- Mock content -->
    <rect x="10" y="40" width="80" height="35" rx="4" fill="#1a2744"/>
    <text x="50" y="56" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#22c55e">37.0°C</text>
    <text x="50" y="68" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="7" fill="#5a7090">温度</text>
    <rect x="95" y="40" width="80" height="35" rx="4" fill="#1a2744"/>
    <text x="135" y="56" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1677ff">7.02</text>
    <text x="135" y="68" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="7" fill="#5a7090">pH</text>
    <rect x="180" y="40" width="80" height="35" rx="4" fill="#1a2744"/>
    <text x="220" y="56" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#f59e0b">42%</text>
    <text x="220" y="68" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="7" fill="#5a7090">DO</text>
    <rect x="265" y="40" width="80" height="35" rx="4" fill="#1a2744"/>
    <text x="305" y="56" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#8b5cf6">300</text>
    <text x="305" y="68" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="7" fill="#5a7090">RPM</text>
    <!-- Mock chart area -->
    <rect x="10" y="82" width="340" height="80" rx="4" fill="#0d1520"/>
    <polyline points="20,140 60,130 100,135 140,120 180,125 220,110 260,115 300,100 340,105" fill="none" stroke="#1677ff" stroke-width="1.5"/>
    <polyline points="20,145 60,140 100,142 140,138 180,135 220,132 260,130 300,128 340,125" fill="none" stroke="#22c55e" stroke-width="1"/>
    <!-- Tank selector -->
    <g transform="translate(10, 170)">
      <rect x="0" y="0" width="32" height="18" rx="3" fill="#1677ff" opacity="0.3"/>
      <text x="16" y="13" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#1677ff">R1</text>
      <rect x="38" y="0" width="32" height="18" rx="3" fill="#162030"/>
      <text x="54" y="13" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#5a7090">R2</text>
      <rect x="76" y="0" width="32" height="18" rx="3" fill="#162030"/>
      <text x="92" y="13" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#5a7090">R3</text>
      <text x="140" y="13" font-family="Microsoft YaHei, sans-serif" font-size="8" fill="#4a6080">8 罐切换</text>
    </g>

    <!-- Card 2: DAG Editor -->
    <rect x="380" y="0" width="360" height="210" rx="8" fill="#111a2a" stroke="#8b5cf6" stroke-width="1"/>
    <rect x="380" y="0" width="360" height="30" rx="8" fill="#1e2d45"/>
    <rect x="380" y="20" width="360" height="10" fill="#1e2d45"/>
    <circle cx="395" cy="15" r="4" fill="#ef4444"/>
    <circle cx="410" cy="15" r="4" fill="#f59e0b"/>
    <circle cx="425" cy="15" r="4" fill="#22c55e"/>
    <text x="560" y="19" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">配方 DAG 编辑器</text>
    <!-- Mock DAG nodes -->
    <rect x="400" y="50" width="80" height="30" rx="6" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
    <text x="440" y="70" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="8" fill="#8b5cf6">准备</text>
    <line x1="480" y1="65" x2="510" y2="65" stroke="#5a7090" stroke-width="1"/>
    <rect x="510" y="50" width="80" height="30" rx="6" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
    <text x="550" y="70" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="8" fill="#8b5cf6">SIP 灭菌</text>
    <line x1="590" y1="65" x2="620" y2="65" stroke="#5a7090" stroke-width="1"/>
    <rect x="620" y="50" width="80" height="30" rx="6" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
    <text x="660" y="70" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="8" fill="#8b5cf6">升温</text>
    <!-- Branch -->
    <line x1="550" y1="80" x2="550" y2="105" stroke="#5a7090" stroke-width="1"/>
    <rect x="510" y="105" width="80" height="30" rx="6" fill="#1a2744" stroke="#f59e0b" stroke-width="1"/>
    <text x="550" y="125" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="8" fill="#f59e0b">Batch</text>
    <line x1="590" y1="120" x2="620" y2="120" stroke="#5a7090" stroke-width="1"/>
    <rect x="620" y="105" width="80" height="30" rx="6" fill="#1a2744" stroke="#22c55e" stroke-width="1"/>
    <text x="660" y="125" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="8" fill="#22c55e">Fed-batch</text>
    <!-- Condition label -->
    <rect x="400" y="150" width="320" height="22" rx="4" fill="#162030"/>
    <text x="410" y="166" font-family="JetBrains Mono, monospace" font-size="8" fill="#5a7090">condition: DO_spike == true ? Fed-batch : Continue</text>
    <text x="400" y="195" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#4a6080">@xyflow/react 可视化图编辑 + 条件分支</text>

    <!-- Card 3: Data Explorer -->
    <rect x="760" y="0" width="360" height="210" rx="8" fill="#111a2a" stroke="#22c55e" stroke-width="1"/>
    <rect x="760" y="0" width="360" height="30" rx="8" fill="#1e2d45"/>
    <rect x="760" y="20" width="360" height="10" fill="#1e2d45"/>
    <circle cx="775" cy="15" r="4" fill="#ef4444"/>
    <circle cx="790" cy="15" r="4" fill="#f59e0b"/>
    <circle cx="805" cy="15" r="4" fill="#22c55e"/>
    <text x="940" y="19" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7a8faa">数据浏览器 / SPC 控制图</text>
    <!-- Mock SPC chart -->
    <rect x="775" y="45" width="330" height="120" rx="4" fill="#0d1520"/>
    <line x1="790" y1="75" x2="1090" y2="75" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="4,3"/>
    <text x="1095" y="79" font-family="Microsoft YaHei, sans-serif" font-size="7" fill="#ef4444">UCL</text>
    <line x1="790" y1="105" x2="1090" y2="105" stroke="#22c55e" stroke-width="0.5"/>
    <text x="1095" y="109" font-family="Microsoft YaHei, sans-serif" font-size="7" fill="#22c55e">CL</text>
    <line x1="790" y1="135" x2="1090" y2="135" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="4,3"/>
    <text x="1095" y="139" font-family="Microsoft YaHei, sans-serif" font-size="7" fill="#ef4444">LCL</text>
    <polyline points="800,108 830,100 860,103 890,98 920,110 950,107 980,102 1010,105 1040,100 1070,108" fill="none" stroke="#1677ff" stroke-width="1.5"/>
    <!-- SPC metrics -->
    <text x="780" y="185" font-family="JetBrains Mono, monospace" font-size="9" fill="#22c55e">Cp: 1.45</text>
    <text x="860" y="185" font-family="JetBrains Mono, monospace" font-size="9" fill="#22c55e">Cpk: 1.32</text>
    <text x="950" y="185" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#7a8faa">X-bar/R + EWMA</text>
    <text x="780" y="200" font-family="Microsoft YaHei, sans-serif" font-size="8" fill="#4a6080">Western Electric 规则自动检测</text>
  </g>

  <!-- Row 2: Feature categories -->
  <g transform="translate(80, 410)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#b0c4e8">14 页功能覆盖</text>

    <g transform="translate(0, 20)">
      <!-- Category boxes -->
      <rect x="0" y="0" width="180" height="60" rx="6" fill="#1a2744" stroke="#1677ff" stroke-width="1"/>
      <text x="15" y="20" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#1677ff">控制与监测</text>
      <text x="15" y="38" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">Dashboard</text>
      <text x="15" y="52" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">手动控制 / PLC 配置</text>

      <rect x="200" y="0" width="180" height="60" rx="6" fill="#1a2744" stroke="#8b5cf6" stroke-width="1"/>
      <text x="215" y="20" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#8b5cf6">配方与批次</text>
      <text x="215" y="38" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">DAG 编辑器 / 批次管理</text>
      <text x="215" y="52" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">配方审批流</text>

      <rect x="400" y="0" width="180" height="60" rx="6" fill="#1a2744" stroke="#22c55e" stroke-width="1"/>
      <text x="415" y="20" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#22c55e">数据分析</text>
      <text x="415" y="38" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">数据浏览器 / 批次对比</text>
      <text x="415" y="52" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">KPI/OEE / SPC</text>

      <rect x="600" y="0" width="180" height="60" rx="6" fill="#1a2744" stroke="#f59e0b" stroke-width="1"/>
      <text x="615" y="20" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">设备管理</text>
      <text x="615" y="38" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">传感器校准向导</text>
      <text x="615" y="52" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">公式系数修改</text>

      <rect x="800" y="0" width="180" height="60" rx="6" fill="#1a2744" stroke="#ef4444" stroke-width="1"/>
      <text x="815" y="20" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#ef4444">安全合规</text>
      <text x="815" y="38" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">审计日志 / 4 级权限</text>
      <text x="815" y="52" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#5a7090">API 密钥管理</text>
    </g>
  </g>

  <!-- UI Style note -->
  <g transform="translate(80, 520)">
    <rect x="0" y="0" width="1120" height="35" rx="6" fill="#141414" stroke="#1677ff" stroke-width="0.5"/>
    <rect x="20" y="8" width="18" height="18" rx="3" fill="#141414" stroke="#7a8faa" stroke-width="0.5"/>
    <rect x="48" y="8" width="18" height="18" rx="3" fill="#1677ff"/>
    <rect x="76" y="8" width="18" height="18" rx="3" fill="#22c55e"/>
    <text x="110" y="22" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">深色 MES 主题</text>
    <text x="230" y="22" font-family="JetBrains Mono, monospace" font-size="11" fill="#5a7090">#141414 + #1677ff</text>
    <text x="430" y="22" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">数值字体 JetBrains Mono | 状态 LED 指示</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#0d1a2e"/>
  <text x="80" y="706" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#4a6080">BIOCore 实验室发酵罐智能控制平台</text>
  <text x="640" y="706" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#3a5070">现代化 Web 前端</text>
  <text x="1200" y="706" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#4a6080">12 / 18</text>
</svg>