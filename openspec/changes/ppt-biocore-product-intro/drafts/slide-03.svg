<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#122040"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg3)"/>
  <rect x="0" y="0" width="1280" height="4" fill="#1677ff"/>

  <!-- Part indicator -->
  <rect x="80" y="24" width="8" height="30" rx="2" fill="#1677ff"/>
  <text x="100" y="45" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#4a6080">第一部分 | 工业级硬件底座与安全体系</text>

  <!-- Page title -->
  <text x="80" y="85" font-family="Microsoft YaHei, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">工业级硬件底座</text>
  <text x="80" y="112" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#7a8faa">西门子 S7-200 SMART G2 — 8AI/4AO/14DI/10DQ/8PID</text>
  <rect x="80" y="122" width="80" height="2" fill="#1677ff" rx="1"/>

  <!-- Left column: I/O Spec Table (asymmetric larger) -->
  <g transform="translate(80, 145)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#b0c4e8">I/O 规格表</text>

    <!-- Table header -->
    <rect x="0" y="15" width="620" height="30" rx="4" fill="#1e2d45"/>
    <text x="15" y="35" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#7a8faa">I/O 类型</text>
    <text x="200" y="35" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#7a8faa">数量</text>
    <text x="320" y="35" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#7a8faa">典型用途</text>

    <!-- Row 1: AI -->
    <rect x="0" y="48" width="620" height="32" rx="0" fill="#141e30"/>
    <text x="15" y="69" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#b0c4e8">模拟输入 AI</text>
    <text x="200" y="69" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" fill="#1677ff">8 路</text>
    <text x="320" y="69" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">PT100/pH/DO/罐压/气流/称重</text>

    <!-- Row 2: AO -->
    <rect x="0" y="82" width="620" height="32" rx="0" fill="#111a2a"/>
    <text x="15" y="103" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#b0c4e8">模拟输出 AO</text>
    <text x="200" y="103" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" fill="#1677ff">4 路</text>
    <text x="320" y="103" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">蒸汽阀/冷却阀/空气阀</text>

    <!-- Row 3: DI -->
    <rect x="0" y="116" width="620" height="32" rx="0" fill="#141e30"/>
    <text x="15" y="137" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#b0c4e8">数字输入 DI</text>
    <text x="200" y="137" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" fill="#1677ff">14 路</text>
    <text x="320" y="137" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">急停/阀位确认/盖锁/压力开关</text>

    <!-- Row 4: DQ -->
    <rect x="0" y="150" width="620" height="32" rx="0" fill="#111a2a"/>
    <text x="15" y="171" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#b0c4e8">数字输出 DQ</text>
    <text x="200" y="171" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" fill="#1677ff">10 路</text>
    <text x="320" y="171" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">4 台蠕动泵 + 电磁阀组</text>

    <!-- Row 5: PID -->
    <rect x="0" y="184" width="620" height="32" rx="0" fill="#141e30"/>
    <text x="15" y="205" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#b0c4e8">PID 回路</text>
    <text x="200" y="205" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" fill="#1677ff">8 路</text>
    <text x="320" y="205" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7a8faa">温度/搅拌/DO/pH/罐压</text>
  </g>

  <!-- Left column: Communication specs -->
  <g transform="translate(80, 390)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#b0c4e8">通讯接口</text>
    <rect x="0" y="15" width="620" height="1" fill="#1e2d45"/>

    <circle cx="10" cy="35" r="3" fill="#22c55e"/>
    <text x="22" y="39" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7a8faa">SB CM01 RS485 Modbus RTU — VFD 变频器 + 扩展设备</text>

    <circle cx="10" cy="60" r="3" fill="#22c55e"/>
    <text x="22" y="64" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7a8faa">SB CM02 RS232 — 补充通讯</text>

    <circle cx="10" cy="85" r="3" fill="#22c55e"/>
    <text x="22" y="89" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7a8faa">内置以太网 RJ45 — S7 协议主通讯链路 (TCP:102)</text>
  </g>

  <!-- Right column: Architecture mini-diagram + cost -->
  <g transform="translate(760, 145)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#b0c4e8">系统定位</text>

    <!-- Mini 3-layer -->
    <rect x="20" y="25" width="380" height="50" rx="6" fill="#162030" stroke="#1677ff" stroke-width="1"/>
    <text x="210" y="55" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1677ff">浏览器 (Next.js 14)</text>

    <line x1="210" y1="75" x2="210" y2="95" stroke="#3a5070" stroke-width="1"/>
    <polygon points="210,95 205,88 215,88" fill="#3a5070"/>

    <rect x="20" y="95" width="380" height="50" rx="6" fill="#162030" stroke="#22c55e" stroke-width="1"/>
    <text x="210" y="125" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#22c55e">服务器 (Node.js + 9 包)</text>

    <line x1="210" y1="145" x2="210" y2="165" stroke="#3a5070" stroke-width="1"/>
    <polygon points="210,165 205,158 215,158" fill="#3a5070"/>

    <rect x="20" y="165" width="380" height="50" rx="6" fill="#162030" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="210" y="195" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#f59e0b">PLC (S7-200 SMART G2)</text>

    <!-- Highlight arrow -->
    <text x="420" y="195" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#f59e0b">本页</text>
  </g>

  <!-- Cost badge -->
  <g transform="translate(760, 400)">
    <rect x="20" y="0" width="380" height="100" rx="10" fill="#1a2744" stroke="#1677ff" stroke-width="1"/>
    <text x="210" y="35" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#7a8faa">硬件 BOM 成本</text>
    <text x="210" y="70" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="36" font-weight="bold" fill="#1677ff">¥3,100</text>
    <text x="210" y="88" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#4a6080">不含传感器和执行机构（发酵罐自带）</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#0d1a2e"/>
  <text x="80" y="706" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#4a6080">BIOCore 实验室发酵罐智能控制平台</text>
  <text x="640" y="706" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#3a5070">工业级硬件底座</text>
  <text x="1200" y="706" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#4a6080">03 / 18</text>
</svg>