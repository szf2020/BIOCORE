<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg18" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#122040"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1677ff"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg18)"/>

  <!-- Top accent gradient line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#4a9eff" stroke-width="0.5">
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
  </g>

  <!-- Main title -->
  <text x="640" y="180" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="42" font-weight="bold" fill="#ffffff">开始使用 BIOCore</text>

  <!-- Subtitle -->
  <text x="640" y="225" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#7a8faa">工业级可靠 | 本地 AI 智能 | 完全开放 | 成本 1/5</text>

  <!-- Gradient divider -->
  <rect x="490" y="245" width="300" height="3" rx="1.5" fill="url(#accentGrad)"/>

  <!-- Four core metrics -->
  <g transform="translate(140, 280)">
    <rect x="0" y="0" width="220" height="90" rx="10" fill="#1a2744" stroke="#1677ff" stroke-width="1.5"/>
    <text x="110" y="35" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="30" font-weight="bold" fill="#1677ff">100%</text>
    <text x="110" y="60" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#7a8faa">离线 AI 运行</text>
    <text x="110" y="78" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#4a6080">数据不出实验室</text>

    <rect x="250" y="0" width="220" height="90" rx="10" fill="#1a2744" stroke="#22c55e" stroke-width="1.5"/>
    <text x="360" y="35" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="30" font-weight="bold" fill="#22c55e">ISA-88</text>
    <text x="360" y="60" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#7a8faa">工业批次标准</text>
    <text x="360" y="78" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#4a6080">5 层安全防护</text>

    <rect x="500" y="0" width="220" height="90" rx="10" fill="#1a2744" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="610" y="35" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="30" font-weight="bold" fill="#f59e0b">8 罐</text>
    <text x="610" y="60" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#7a8faa">单 PC 并行</text>
    <text x="610" y="78" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#4a6080">97+ REST API</text>

    <rect x="750" y="0" width="220" height="90" rx="10" fill="#1a2744" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="860" y="35" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="30" font-weight="bold" fill="#8b5cf6">1/5</text>
    <text x="860" y="60" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#7a8faa">竞品成本</text>
    <text x="860" y="78" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#4a6080">Y3,500 起步</text>
  </g>

  <!-- Call to action buttons -->
  <g transform="translate(200, 420)">
    <rect x="0" y="0" width="260" height="55" rx="8" fill="#1677ff" opacity="0.15" stroke="#1677ff" stroke-width="1.5"/>
    <text x="130" y="25" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1677ff">社区版免费下载</text>
    <text x="130" y="44" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#5a7090">MIT 开源 | GitHub</text>

    <rect x="290" y="0" width="260" height="55" rx="8" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
    <text x="420" y="25" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#22c55e">技术架构交流</text>
    <text x="420" y="44" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#5a7090">深入讨论方案设计</text>

    <rect x="580" y="0" width="260" height="55" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="710" y="25" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#f59e0b">PLC 调试支持</text>
    <text x="710" y="44" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#5a7090">硬件部署 + 现场调试</text>
  </g>

  <!-- Roadmap -->
  <g transform="translate(140, 510)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#4a6080">开发路线图</text>

    <g transform="translate(0, 20)">
      <!-- Timeline line -->
      <line x1="50" y1="15" x2="950" y2="15" stroke="#1e2d45" stroke-width="2"/>

      <!-- Phase 1 -->
      <circle cx="50" cy="15" r="8" fill="#22c55e"/>
      <text x="50" y="42" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#22c55e">MVP</text>
      <text x="50" y="57" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#5a7090">基础控制</text>

      <!-- Phase 2 -->
      <circle cx="275" cy="15" r="8" fill="#1677ff"/>
      <text x="275" y="42" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#1677ff">数据分析</text>
      <text x="275" y="57" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#5a7090">KPI/SPC/DoE</text>

      <!-- Phase 3 -->
      <circle cx="500" cy="15" r="8" fill="#f59e0b"/>
      <text x="500" y="42" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">AI 智能</text>
      <text x="500" y="57" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#5a7090">CUSUM/DTW/LLM</text>

      <!-- Phase 4 -->
      <circle cx="725" cy="15" r="8" fill="#8b5cf6"/>
      <text x="725" y="42" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#8b5cf6">高级控制</text>
      <text x="725" y="57" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#5a7090">贝叶斯/自动化</text>

      <!-- Phase 5 -->
      <circle cx="950" cy="15" r="8" fill="#7a8faa" stroke="#7a8faa" stroke-width="1" fill-opacity="0.3"/>
      <text x="950" y="42" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#7a8faa">生态</text>
      <text x="950" y="57" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="9" fill="#5a7090">插件/社区/集成</text>
    </g>
  </g>

  <!-- Contact / Links -->
  <g transform="translate(140, 610)">
    <rect x="0" y="0" width="1000" height="40" rx="6" fill="#1a2744" stroke="#1e2d45" stroke-width="0.5"/>
    <text x="20" y="25" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7a8faa">GitHub</text>
    <text x="80" y="25" font-family="JetBrains Mono, monospace" font-size="12" fill="#1677ff">github.com/biocore</text>
    <text x="320" y="25" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7a8faa">技术文档</text>
    <text x="400" y="25" font-family="JetBrains Mono, monospace" font-size="12" fill="#1677ff">docs.biocore.io</text>
    <text x="620" y="25" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7a8faa">联系我们</text>
    <text x="700" y="25" font-family="JetBrains Mono, monospace" font-size="12" fill="#1677ff">contact@biocore.io</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#0d1a2e"/>
  <text x="640" y="706" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#4a6080">BIOCore 实验室发酵罐智能控制平台 | 产品介绍</text>
  <text x="1200" y="706" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#4a6080">18 / 18</text>
</svg>