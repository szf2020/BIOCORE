<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#122040"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg1)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#4a9eff" stroke-width="0.5">
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="#1677ff"/>

  <!-- Bioreactor silhouette (simplified) -->
  <g transform="translate(900, 160)" opacity="0.12" fill="#4a9eff">
    <ellipse cx="100" cy="0" rx="80" ry="20"/>
    <rect x="20" y="0" width="160" height="300" rx="10"/>
    <ellipse cx="100" cy="300" rx="80" ry="20"/>
    <!-- Stirrer -->
    <line x1="100" y1="20" x2="100" y2="260" stroke="#4a9eff" stroke-width="3"/>
    <line x1="60" y1="140" x2="140" y2="140" stroke="#4a9eff" stroke-width="3"/>
    <line x1="60" y1="200" x2="140" y2="200" stroke="#4a9eff" stroke-width="3"/>
  </g>

  <!-- Main title -->
  <text x="100" y="260" font-family="Microsoft YaHei, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" letter-spacing="2">BIOCore</text>
  <text x="100" y="320" font-family="Microsoft YaHei, sans-serif" font-size="32" fill="#b0c4e8">实验室发酵罐智能控制平台</text>

  <!-- Divider -->
  <rect x="100" y="345" width="120" height="3" fill="#1677ff" rx="1.5"/>

  <!-- Subtitle -->
  <text x="100" y="390" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#7a8faa">工业 PLC 可靠性 | 本地 AI 零云依赖 | 8 罐并行 | 成本 1/5</text>

  <!-- Four key metric badges -->
  <g transform="translate(100, 440)">
    <!-- Badge 1: 100% Offline -->
    <rect x="0" y="0" width="200" height="70" rx="8" fill="#1a2744" stroke="#1677ff" stroke-width="1"/>
    <text x="100" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" font-weight="bold" fill="#1677ff">100%</text>
    <text x="100" y="52" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#7a8faa">离线 AI 运行</text>

    <!-- Badge 2: ISA-88 -->
    <rect x="220" y="0" width="200" height="70" rx="8" fill="#1a2744" stroke="#1677ff" stroke-width="1"/>
    <text x="320" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" font-weight="bold" fill="#1677ff">ISA-88</text>
    <text x="320" y="52" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#7a8faa">国际批次控制标准</text>

    <!-- Badge 3: 8 Tanks -->
    <rect x="440" y="0" width="200" height="70" rx="8" fill="#1a2744" stroke="#1677ff" stroke-width="1"/>
    <text x="540" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" font-weight="bold" fill="#1677ff">8 罐</text>
    <text x="540" y="52" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#7a8faa">单 PC 并行控制</text>

    <!-- Badge 4: 1/5 Cost -->
    <rect x="660" y="0" width="200" height="70" rx="8" fill="#1a2744" stroke="#1677ff" stroke-width="1"/>
    <text x="760" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" font-weight="bold" fill="#1677ff">1/5</text>
    <text x="760" y="52" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#7a8faa">竞品成本</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#0d1a2e"/>
  <text x="100" y="706" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#4a6080">BIOCore 实验室发酵罐智能控制平台 | 产品介绍</text>
  <text x="1180" y="706" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#4a6080">01 / 18</text>
</svg>