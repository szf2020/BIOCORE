      <text x="0" y="0" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="13" font-weight="700" fill="#1E293B">关键参数</text>
      <text x="0" y="22" font-family="JetBrains Mono, monospace" font-size="13" fill="#D97706">T: 30&#176;C</text>
      <text x="170" y="22" font-family="JetBrains Mono, monospace" font-size="13" fill="#D97706">pH: 5.0-5.5</text>
      <text x="0" y="44" font-family="JetBrains Mono, monospace" font-size="13" fill="#D97706">RQ &lt; 1.1</text>
      <text x="170" y="44" font-family="JetBrains Mono, monospace" font-size="13" fill="#D97706">DO-stat</text>
    </g>

    <!-- Divider -->
    <line x1="20" y1="286" x2="340" y2="286" stroke="#E2E8F0" stroke-width="1"/>

    <!-- AI value -->
