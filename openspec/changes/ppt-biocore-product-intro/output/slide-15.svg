      <text x="0" y="0" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="13" font-weight="700" fill="#D97706">AI 辅助价值</text>

      <circle cx="8" cy="22" r="4" fill="#D97706"/>
      <text x="20" y="26" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="13" fill="#64748B">AI 监测 RQ &gt; 1.1</text>
      <text x="20" y="42" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="13" fill="#94A3B8">建议降低补料速率</text>

      <circle cx="8" cy="62" r="4" fill="#D97706"/>
      <text x="20" y="66" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="13" fill="#64748B">碱消耗振荡检测</text>
      <text x="20" y="82" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="13" fill="#94A3B8">识别溢流代谢</text>

      <circle cx="8" cy="102" r="4" fill="#D97706"/>
      <text x="20" y="106" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="13" fill="#64748B">自动 DO-stat 补料切换</text>
