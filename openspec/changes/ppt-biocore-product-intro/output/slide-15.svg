      <rect x="0" y="48" width="320" height="28" rx="6" fill="#FAFBFC" stroke="#E2E8F0" stroke-width="0.5"/>
      <text x="12" y="67" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="12" fill="#64748B">严格温度控制 37.0 &#177;0.3&#176;C</text>

      <rect x="0" y="82" width="320" height="28" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="0.5"/>
      <text x="12" y="101" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="12" fill="#64748B">精确 pH 控制 7.0 &#177;0.05</text>

      <rect x="0" y="116" width="320" height="28" rx="6" fill="#FAFBFC" stroke="#E2E8F0" stroke-width="0.5"/>
      <text x="12" y="135" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="12" fill="#64748B">长周期培养 7-14 天连续监控</text>
    </g>

