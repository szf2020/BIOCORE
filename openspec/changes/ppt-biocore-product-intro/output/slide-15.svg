      <text x="0" y="22" font-family="JetBrains Mono, monospace" font-size="13" fill="#1E40AF">T: 37.0 &#177;0.3&#176;C</text>
      <text x="0" y="44" font-family="JetBrains Mono, monospace" font-size="13" fill="#1E40AF">pH: 7.0 &#177;0.05</text>
      <text x="170" y="22" font-family="JetBrains Mono, monospace" font-size="13" fill="#1E40AF">RPM: 80-120</text>
      <text x="170" y="44" font-family="JetBrains Mono, monospace" font-size="13" fill="#1E40AF">7-14 天</text>
    </g>

    <!-- Divider -->
    <line x1="20" y1="286" x2="340" y2="286" stroke="#E2E8F0" stroke-width="1"/>

    <!-- AI value -->
    <g transform="translate(20, 300)">
      <text x="0" y="0" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="13" font-weight="700" fill="#1E40AF">AI 辅助价值</text>

      <circle cx="8" cy="22" r="4" fill="#1E40AF"/>
      <text x="20" y="26" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="13" fill="#64748B">软测量 VCD 推断</text>
      <text x="20" y="42" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="13" fill="#94A3B8">活细胞密度在线估算</text>

      <circle cx="8" cy="62" r="4" fill="#1E40AF"/>
      <text x="20" y="66" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="13" fill="#64748B">长周期 CUSUM 漂移检测</text>
      <text x="20" y="82" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="13" fill="#94A3B8">7-14 天持续监控</text>

      <circle cx="8" cy="102" r="4" fill="#1E40AF"/>
      <text x="20" y="106" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="13" fill="#64748B">无人值守持续运行</text>
    </g>

    <!-- Stack tags -->
    <g transform="translate(20, 432)">
      <rect x="0" y="0" width="96" height="26" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="0.8"/>
      <text x="48" y="17" text-anchor="middle" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="12" fill="#1E40AF">PLC 控制</text>
      <rect x="108" y="0" width="96" height="26" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="0.8"/>
      <text x="156" y="17" text-anchor="middle" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="12" fill="#1E40AF">AI 辅助</text>
