    <!-- Stack tags -->
    <g transform="translate(20, 432)">
      <rect x="0" y="0" width="96" height="26" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.8"/>
      <text x="48" y="17" text-anchor="middle" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="12" fill="#D97706">PLC 控制</text>
      <rect x="108" y="0" width="96" height="26" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.8"/>
      <text x="156" y="17" text-anchor="middle" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="12" fill="#D97706">AI 辅助</text>
      <rect x="216" y="0" width="96" height="26" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.8"/>
      <text x="264" y="17" text-anchor="middle" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="12" fill="#D97706">数据分析</text>
    </g>
  </g>

  <!-- Column 3: CHO Cell Culture -->
  <g transform="translate(840, 148)">
    <rect x="0" y="0" width="360" height="500" rx="12" fill="#F8FAFC" filter="url(#s15-shadow)" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="360" height="52" rx="12" fill="#EFF6FF"/>
    <rect x="0" y="40" width="360" height="12" fill="#F8FAFC"/>
