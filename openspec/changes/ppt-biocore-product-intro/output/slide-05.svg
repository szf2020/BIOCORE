<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="s5-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="s5-accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="s5-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
    <filter id="s5-shadow-sm">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#s5-bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#s5-accent-bar)" data-decorative="true"/>

  <!-- Part indicator -->
  <rect x="80" y="28" width="4" height="24" rx="2" fill="#1E40AF"/>
  <text x="96" y="46" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B" letter-spacing="0.5">第一部分 | 工业级硬件底座与安全体系</text>

  <!-- Page title -->
  <text x="80" y="88" font-family="Source Serif Pro, Georgia, serif" font-size="28" font-weight="700" fill="#1E293B">ISA-88 批次控制引擎</text>
  <text x="80" y="114" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#64748B">6 状态机 + 14 种 Phase + 3 种执行模式</text>
  <rect x="80" y="126" width="60" height="3" rx="1.5" fill="#059669"/>

  <!-- ==================== HERO: State Machine Card ==================== -->
  <rect x="60" y="148" width="780" height="260" rx="12" fill="#F8FAFC" filter="url(#s5-shadow)" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Card header -->
  <text x="88" y="178" font-family="Source Serif Pro, Georgia, serif" font-size="16" font-weight="600" fill="#1E293B">ISA-88 六状态转换图</text>

  <!-- Idle -->
  <rect x="100" y="200" width="120" height="46" rx="23" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5" filter="url(#s5-shadow-sm)"/>
  <text x="160" y="228" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748B">Idle 闲置</text>

  <!-- Arrow Idle -> Running -->
  <line x1="220" y1="223" x2="278" y2="223" stroke="#059669" stroke-width="2"/>
  <polygon points="278,223 270,218 270,228" fill="#059669"/>

  <!-- Running -->
  <rect x="280" y="200" width="140" height="46" rx="23" fill="#ECFDF5" stroke="#059669" stroke-width="2" filter="url(#s5-shadow-sm)"/>
  <text x="350" y="228" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#059669">Running 运行</text>

  <!-- Arrow Running -> Complete -->
  <line x1="420" y1="223" x2="478" y2="223" stroke="#1E40AF" stroke-width="2"/>
  <polygon points="478,223 470,218 470,228" fill="#1E40AF"/>

  <!-- Complete -->
  <rect x="480" y="200" width="140" height="46" rx="23" fill="#EFF6FF" stroke="#1E40AF" stroke-width="1.5" filter="url(#s5-shadow-sm)"/>
  <text x="550" y="228" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1E40AF">Complete 完成</text>

  <!-- Arrow Running -> Paused (down) -->
  <line x1="350" y1="246" x2="350" y2="278" stroke="#F59E0B" stroke-width="1.5"/>
  <polygon points="350,278 345,270 355,270" fill="#F59E0B"/>

  <!-- Paused -->
  <rect x="280" y="280" width="140" height="46" rx="23" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5" filter="url(#s5-shadow-sm)"/>
  <text x="350" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#F59E0B">Paused 暂停</text>

  <!-- Arrow Paused -> Held -->
  <line x1="420" y1="303" x2="478" y2="303" stroke="#DC2626" stroke-width="1.5"/>
  <polygon points="478,303 470,298 470,308" fill="#DC2626"/>

  <!-- Held -->
  <rect x="480" y="280" width="140" height="46" rx="23" fill="#FEF2F2" stroke="#DC2626" stroke-width="2" filter="url(#s5-shadow-sm)"/>
  <text x="550" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#DC2626">Held 保持</text>

  <!-- Held annotation -->
  <text x="548" y="340" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626">故障/心跳断开</text>

  <!-- Arrow Held -> Stopped -->
  <line x1="550" y1="348" x2="550" y2="362" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="550,362 545,354 555,354" fill="#64748B"/>

  <!-- Stopped -->
  <rect x="480" y="364" width="140" height="40" rx="20" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5" filter="url(#s5-shadow-sm)"/>
  <text x="550" y="389" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748B">Stopped 停止</text>

  <!-- Reset arc -->
  <path d="M 480,246 Q 140,330 160,246" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="270" y="280" font-family="JetBrains Mono, monospace" font-size="12" fill="#94A3B8">Reset</text>

  <!-- XState label -->
  <rect x="660" y="200" width="158" height="36" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1"/>
  <text x="739" y="224" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#8B5CF6">XState v5</text>
  <text x="660" y="258" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">确定性状态转换</text>
  <text x="660" y="278" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">完整可审计日志</text>

  <!-- ==================== GRID RIGHT: Metrics Cards ==================== -->
  <rect x="860" y="148" width="170" height="120" rx="12" fill="#F8FAFC" filter="url(#s5-shadow)" stroke="#E2E8F0" stroke-width="1"/>
  <text x="945" y="192" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="36" font-weight="700" fill="#1E40AF">14</text>
  <text x="945" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748B">Phase 类型</text>
  <rect x="905" y="232" width="80" height="3" rx="1.5" fill="#1E40AF" opacity="0.3"/>

  <rect x="1050" y="148" width="170" height="120" rx="12" fill="#F8FAFC" filter="url(#s5-shadow)" stroke="#E2E8F0" stroke-width="1"/>
  <text x="1135" y="192" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="36" font-weight="700" fill="#059669">3</text>
  <text x="1135" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748B">执行模式</text>
  <rect x="1095" y="232" width="80" height="3" rx="1.5" fill="#059669" opacity="0.3"/>

  <rect x="860" y="288" width="360" height="120" rx="12" fill="#F8FAFC" filter="url(#s5-shadow)" stroke="#E2E8F0" stroke-width="1"/>
  <text x="1040" y="336" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="36" font-weight="700" fill="#1E293B">6</text>
  <text x="1040" y="362" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748B">ISA-88 状态机</text>
  <rect x="1000" y="376" width="80" height="3" rx="1.5" fill="#1E293B" opacity="0.2"/>

  <!-- ==================== BOTTOM LEFT: 14 Phase Grid ==================== -->
  <rect x="60" y="428" width="580" height="244" rx="12" fill="#F8FAFC" filter="url(#s5-shadow)" stroke="#E2E8F0" stroke-width="1"/>
  <text x="88" y="458" font-family="Source Serif Pro, Georgia, serif" font-size="16" font-weight="600" fill="#1E293B">14 种 Phase 类型</text>

  <!-- Category: System ops -->
  <rect x="88" y="474" width="72" height="26" rx="6" fill="#EFF6FF"/>
  <text x="124" y="492" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1E40AF">系统操作</text>
  <rect x="170" y="474" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="213" y="492" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">准备</text>
  <rect x="264" y="474" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="307" y="492" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">加水</text>
  <rect x="358" y="474" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="401" y="492" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">手动加料</text>
  <rect x="452" y="474" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="495" y="492" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">排液</text>

  <!-- Category: Temp -->
  <rect x="88" y="508" width="72" height="26" rx="6" fill="#FFFBEB"/>
  <text x="124" y="526" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#F59E0B">温控</text>
  <rect x="170" y="508" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="213" y="526" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">升温</text>
  <rect x="264" y="508" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="307" y="526" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">温度控制</text>

  <!-- Category: Process -->
  <rect x="88" y="542" width="72" height="26" rx="6" fill="#ECFDF5"/>
  <text x="124" y="560" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#059669">过程控制</text>
  <rect x="170" y="542" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="213" y="560" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">搅拌</text>
  <rect x="264" y="542" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="307" y="560" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">补料</text>
  <rect x="358" y="542" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="401" y="560" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">pH 控制</text>

  <!-- Category: Fermentation -->
  <rect x="88" y="576" width="72" height="26" rx="6" fill="#F5F3FF"/>
  <text x="124" y="594" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8B5CF6">发酵主体</text>
  <rect x="170" y="576" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="213" y="594" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">Batch 培养</text>
  <rect x="264" y="576" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="307" y="594" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">Fed-batch</text>
  <rect x="358" y="576" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="401" y="594" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">诱导表达</text>

  <!-- Category: CIP/SIP -->
  <rect x="88" y="610" width="72" height="26" rx="6" fill="#FEF2F2"/>
  <text x="124" y="628" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626">清洗灭菌</text>
  <rect x="170" y="610" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="213" y="628" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">SIP 灭菌</text>
  <rect x="264" y="610" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="307" y="628" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">CIP 清洗</text>

  <!-- ==================== BOTTOM RIGHT: 3 Execution Modes ==================== -->
  <rect x="660" y="428" width="560" height="244" rx="12" fill="#F8FAFC" filter="url(#s5-shadow)" stroke="#E2E8F0" stroke-width="1"/>
  <text x="688" y="458" font-family="Source Serif Pro, Georgia, serif" font-size="16" font-weight="600" fill="#1E293B">3 种执行模式</text>

  <!-- Mode 1: Sequential -->
  <rect x="688" y="474" width="504" height="58" rx="10" fill="#FFFFFF" stroke="#059669" stroke-width="1.5" filter="url(#s5-shadow-sm)"/>
  <rect x="688" y="474" width="5" height="58" rx="2" fill="#059669"/>
  <text x="712" y="498" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#059669">顺序模式</text>
  <text x="812" y="498" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#475569">成熟工艺自动推进 Phase 序列</text>
  <text x="712" y="518" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">适用：标准化生产</text>

  <!-- Mode 2: Free -->
  <rect x="688" y="542" width="504" height="58" rx="10" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" filter="url(#s5-shadow-sm)"/>
  <rect x="688" y="542" width="5" height="58" rx="2" fill="#F59E0B"/>
  <text x="712" y="566" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#F59E0B">自由模式</text>
  <text x="812" y="566" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#475569">操作员手动选择下一 Phase</text>
  <text x="712" y="586" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">适用：工艺摸索/研发</text>

  <!-- Mode 3: DAG -->
  <rect x="688" y="610" width="504" height="58" rx="10" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#s5-shadow-sm)"/>
  <rect x="688" y="610" width="5" height="58" rx="2" fill="#8B5CF6"/>
  <text x="712" y="634" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#8B5CF6">DAG 分支模式</text>
  <text x="842" y="634" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#475569">条件路由自动选择分支路径</text>
  <text x="712" y="654" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">适用：复杂条件决策</text>

  <!-- ==================== Footer ==================== -->
  <rect x="0" y="682" width="1280" height="38" fill="#1E293B"/>
  <text x="80" y="706" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">BIOCore 实验室发酵罐智能控制平台</text>
  <text x="640" y="706" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748B">ISA-88 批次控制引擎</text>
  <text x="1200" y="706" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#94A3B8">05 / 18</text>
</svg>