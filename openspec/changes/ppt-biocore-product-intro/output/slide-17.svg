<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="s17-bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="s17-shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
    <filter id="s17-shadow-sm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E293B" flood-opacity="0.05"/>
    </filter>
    <linearGradient id="s17-bar-bio" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#s17-bg)"/>

  <!-- Decorative elements -->
  <g data-decorative="true">
    <rect x="0" y="0" width="1280" height="4" fill="#1E40AF"/>
    <rect x="0" y="4" width="1280" height="2" fill="#059669" opacity="0.4"/>
    <circle cx="1220" cy="360" r="250" fill="#1E40AF" opacity="0.02"/>
  </g>

  <!-- Part indicator -->
  <rect x="60" y="28" width="4" height="24" rx="2" fill="#1E40AF"/>
  <text x="76" y="45" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#64748B" letter-spacing="0.5">第四部分 | 实验设计、竞争优势与商业价值</text>

  <!-- Page title -->
  <text x="60" y="82" font-family="'Source Serif Pro', Georgia, 'Microsoft YaHei', serif" font-size="28" font-weight="700" fill="#1E293B">成本与商业价值</text>
  <text x="60" y="106" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="14" fill="#64748B">¥3,500 起步 — 硬件 BOM 透明，软件社区版免费</text>

  <!-- Top metrics row: 4 KPI cards -->
  <g>
    <!-- Card 1: Starting cost -->
    <rect x="60" y="124" width="270" height="72" rx="10" fill="#F8FAFC" filter="url(#s17-shadow-sm)"/>
    <rect x="60" y="124" width="4" height="72" rx="2" fill="#059669"/>
    <text x="84" y="152" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#64748B">起步成本</text>
    <text x="84" y="180" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700" fill="#059669">¥3,500</text>

    <!-- Card 2: 8-tank cost ratio -->
    <rect x="350" y="124" width="270" height="72" rx="10" fill="#F8FAFC" filter="url(#s17-shadow-sm)"/>
    <rect x="350" y="124" width="4" height="72" rx="2" fill="#1E40AF"/>
    <text x="374" y="152" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#64748B">8 罐成本倍差</text>
    <text x="374" y="180" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700" fill="#1E40AF">36-51x</text>

    <!-- Card 3: Market CAGR -->
    <rect x="640" y="124" width="270" height="72" rx="10" fill="#F8FAFC" filter="url(#s17-shadow-sm)"/>
    <rect x="640" y="124" width="4" height="72" rx="2" fill="#7C3AED"/>
    <text x="664" y="152" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#64748B">市场 CAGR</text>
    <text x="664" y="180" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700" fill="#7C3AED">29.5%</text>

    <!-- Card 4: 2034 market size -->
    <rect x="930" y="124" width="290" height="72" rx="10" fill="#F8FAFC" filter="url(#s17-shadow-sm)"/>
    <rect x="930" y="124" width="4" height="72" rx="2" fill="#D97706"/>
    <text x="954" y="152" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#64748B">2034 市场规模</text>
    <text x="954" y="180" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700" fill="#D97706">$7.6B</text>
  </g>

  <!-- LEFT COLUMN: Cost comparison bar chart -->
  <g>
    <rect x="60" y="216" width="550" height="290" rx="10" fill="#F8FAFC" filter="url(#s17-shadow)"/>
    <text x="84" y="246" font-family="'Source Serif Pro', Georgia, 'Microsoft YaHei', serif" font-size="16" font-weight="600" fill="#1E293B">成本对比（千元）</text>

    <!-- BIOCore bar -->
    <text x="84" y="282" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="13" font-weight="600" fill="#059669">BIOCore</text>
    <rect x="200" y="268" width="32" height="22" rx="4" fill="url(#s17-bar-bio)"/>
    <text x="242" y="284" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600" fill="#059669">¥3.5-7K</text>

    <!-- Eppendorf bar -->
    <text x="84" y="318" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="13" fill="#64748B">Eppendorf</text>
    <rect x="200" y="304" width="190" height="22" rx="4" fill="#DC2626" opacity="0.2"/>
    <rect x="200" y="304" width="190" height="22" rx="4" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.4"/>
    <text x="400" y="320" font-family="'JetBrains Mono', monospace" font-size="12" fill="#DC2626">¥32-45K</text>

    <!-- LUCULLUS bar -->
    <text x="84" y="354" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="13" fill="#64748B">LUCULLUS</text>
    <rect x="200" y="340" width="252" height="22" rx="4" fill="#D97706" opacity="0.2"/>
    <rect x="200" y="340" width="252" height="22" rx="4" fill="none" stroke="#D97706" stroke-width="1" opacity="0.4"/>
    <text x="462" y="356" font-family="'JetBrains Mono', monospace" font-size="12" fill="#D97706">¥40-60K</text>

    <!-- Sartorius bar -->
    <text x="84" y="390" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="13" fill="#64748B">Sartorius</text>
    <rect x="200" y="376" width="355" height="22" rx="4" fill="#DC2626" opacity="0.15"/>
    <rect x="200" y="376" width="355" height="22" rx="4" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.4"/>
    <text x="565" y="392" font-family="'JetBrains Mono', monospace" font-size="12" fill="#DC2626">¥50-85K+</text>

    <!-- 8-tank scenario -->
    <line x1="84" y1="412" x2="586" y2="412" stroke="#E2E8F0" stroke-width="1"/>
    <text x="84" y="436" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="13" font-weight="600" fill="#1E293B">8 罐并行场景</text>
    <text x="84" y="458" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#059669">BIOCore: ¥3,500-7,000（1 套即管 8 罐）</text>
    <text x="84" y="478" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#DC2626">Eppendorf: ¥256,000-360,000（需 8 台）</text>
    <rect x="84" y="488" width="160" height="4" rx="2" fill="#1E40AF" opacity="0.6"/>
    <text x="84" y="502" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#1E40AF">= 36-51 倍差距</text>
  </g>

  <!-- RIGHT COLUMN: Version tiers -->
  <g>
    <rect x="630" y="216" width="590" height="290" rx="10" fill="#F8FAFC" filter="url(#s17-shadow)"/>
    <text x="654" y="246" font-family="'Source Serif Pro', Georgia, 'Microsoft YaHei', serif" font-size="16" font-weight="600" fill="#1E293B">软件版本阶梯</text>

    <!-- Community -->
    <rect x="654" y="262" width="542" height="52" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5" filter="url(#s17-shadow-sm)"/>
    <rect x="654" y="262" width="5" height="52" rx="2" fill="#059669"/>
    <text x="678" y="285" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="14" font-weight="700" fill="#059669">社区版 (MIT 开源)</text>
    <text x="1170" y="285" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#059669" text-anchor="end">FREE</text>
    <text x="678" y="304" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#64748B">基础控制 + Dashboard + 配方管理 + 数据记录</text>

    <!-- Professional -->
    <rect x="654" y="322" width="542" height="52" rx="8" fill="#FFFFFF" stroke="#1E40AF" stroke-width="1" filter="url(#s17-shadow-sm)"/>
    <rect x="654" y="322" width="5" height="52" rx="2" fill="#1E40AF"/>
    <text x="678" y="345" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E40AF">专业版</text>
    <text x="678" y="364" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#64748B">+ 多罐并行 + SPC + KPI + DoE + 配方审批</text>

    <!-- AI Edition -->
    <rect x="654" y="382" width="542" height="52" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1" filter="url(#s17-shadow-sm)"/>
    <rect x="654" y="382" width="5" height="52" rx="2" fill="#D97706"/>
    <text x="678" y="405" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="14" font-weight="700" fill="#D97706">AI Edition</text>
    <text x="678" y="424" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#64748B">+ CUSUM + 软测量 + DTW 批次匹配 + LLM 对话</text>

    <!-- AI Pro -->
    <rect x="654" y="442" width="542" height="52" rx="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1" filter="url(#s17-shadow-sm)"/>
    <rect x="654" y="442" width="5" height="52" rx="2" fill="#7C3AED"/>
    <text x="678" y="465" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="14" font-weight="700" fill="#7C3AED">AI Pro</text>
    <text x="678" y="484" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#64748B">+ 贝叶斯优化 + 根因分析 + 补料优化 + 实验自动化</text>
  </g>

  <!-- BOTTOM ROW: Hardware BOM breakdown -->
  <g>
    <rect x="60" y="524" width="1160" height="140" rx="10" fill="#F8FAFC" filter="url(#s17-shadow)"/>
    <text x="84" y="554" font-family="'Source Serif Pro', Georgia, 'Microsoft YaHei', serif" font-size="16" font-weight="600" fill="#1E293B">硬件 BOM 透明清单</text>
    <text x="340" y="554" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#94A3B8">（不含传感器和执行机构 — 发酵罐自带）</text>

    <!-- BOM items grid -->
    <!-- Row 1 -->
    <rect x="84" y="570" width="240" height="36" rx="6" fill="#F1F5F9"/>
    <text x="96" y="593" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="13" fill="#475569">PLC 主机 ST30</text>
    <text x="308" y="593" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#1E293B" text-anchor="end">¥1,200</text>

    <rect x="340" y="570" width="240" height="36" rx="6" fill="#F1F5F9"/>
    <text x="352" y="593" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="13" fill="#475569">信号板 CM01/02</text>
    <text x="564" y="593" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#1E293B" text-anchor="end">¥400</text>

    <rect x="596" y="570" width="240" height="36" rx="6" fill="#F1F5F9"/>
    <text x="608" y="593" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="13" fill="#475569">AI 模拟量模块</text>
    <text x="820" y="593" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#1E293B" text-anchor="end">¥800</text>

    <rect x="852" y="570" width="240" height="36" rx="6" fill="#F1F5F9"/>
    <text x="864" y="593" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="13" fill="#475569">AO 模拟量输出</text>
    <text x="1076" y="593" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#1E293B" text-anchor="end">¥700</text>

    <!-- Divider -->
    <line x1="84" y1="620" x2="1196" y2="620" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Total -->
    <rect x="1096" y="570" width="100" height="36" rx="6" fill="#059669" opacity="0.08"/>
    <text x="84" y="648" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="14" font-weight="600" fill="#1E293B">合计</text>
    <rect x="120" y="632" width="100" height="24" rx="6" fill="#059669" opacity="0.1"/>
    <text x="170" y="649" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700" fill="#059669" text-anchor="middle">¥3,100</text>

    <!-- Market context -->
    <text x="680" y="648" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">精准发酵生物反应器市场：2034 年 $7.6B｜CAGR 29.5%</text>
  </g>

  <!-- Footer bar -->
  <rect x="60" y="678" width="1160" height="1" fill="#E2E8F0"/>
  <text x="80" y="700" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#94A3B8">BIOCore 实验室发酵罐智能控制平台</text>
  <text x="640" y="700" text-anchor="middle" font-family="Inter, 'Microsoft YaHei', system-ui, sans-serif" font-size="12" fill="#94A3B8">成本与商业价值</text>
  <text x="1200" y="700" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94A3B8">17 / 18</text>
</svg>