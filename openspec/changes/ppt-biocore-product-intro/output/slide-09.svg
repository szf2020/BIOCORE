  <text x="756" y="252" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626" opacity="0.6">上限</text>
  <line x1="160" y1="408" x2="750" y2="408" stroke="#DC2626" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>
  <text x="756" y="412" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626" opacity="0.6">下限</text>

