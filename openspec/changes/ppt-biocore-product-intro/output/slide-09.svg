  <!-- Y grid lines -->
  <line x1="160" y1="260" x2="750" y2="260" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="160" y1="330" x2="750" y2="330" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="160" y1="400" x2="750" y2="400" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,4"/>

