  <!-- Page title -->
  <text x="80" y="90" font-family="Source Serif Pro, Georgia, serif" font-size="30" font-weight="700" fill="#1E293B">CUSUM 异常检测与根因分析</text>
  <text x="80" y="118" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#64748B">比传统阈值报警提前 5-15 分钟预警</text>
