  <polyline points="170,330 195,322 220,338 245,318 270,332 295,325 320,335 345,315 370,328 395,310 420,320 445,305 470,312 495,298 520,288 545,275 570,262 595,252 620,244 645,238" fill="none" stroke="#94A3B8" stroke-width="1.5" opacity="0.5"/>

