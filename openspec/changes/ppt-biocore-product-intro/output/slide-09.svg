  <text x="866" y="524" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#7C3AED">知识库匹配</text>
  <text x="980" y="524" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">模式匹配候选根因</text>
  <text x="866" y="540" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">历史工艺偏差模式库</text>

