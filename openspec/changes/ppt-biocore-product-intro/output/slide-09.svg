  <polyline points="170,380 195,378 220,376 245,372 270,370 295,366 320,362 345,356 370,348 395,338 420,325 445,308 470,290 495,270 520,252 545,236 570,222 595,210 620,200 645,192" fill="none" stroke="#059669" stroke-width="2.5"/>

