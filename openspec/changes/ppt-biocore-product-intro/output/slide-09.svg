  <circle cx="445" cy="308" r="7" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <line x1="445" y1="320" x2="445" y2="432" stroke="#059669" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="445" y="438" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#059669">CUSUM 检测</text>

  <!-- Traditional detection point (later) -->
  <circle cx="620" cy="244" r="7" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <line x1="620" y1="256" x2="620" y2="432" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="620" y="438" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#DC2626">阈值报警</text>

