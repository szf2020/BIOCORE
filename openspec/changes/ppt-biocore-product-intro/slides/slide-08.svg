<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow8" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1E40AF" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowSm8" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#1E40AF" flood-opacity="0.06"/>
    </filter>
    <marker id="arrowGrey" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg8)" data-decorative="true"/>

  <!-- Top accent bar -->
  <g data-decorative="true">
    <rect x="0" y="0" width="1280" height="4" fill="#1E40AF"/>
    <rect x="0" y="4" width="320" height="2" fill="#059669" opacity="0.6"/>
  </g>

  <!-- Part indicator -->
  <rect x="80" y="28" width="4" height="24" rx="2" fill="#059669"/>
  <text x="96" y="46" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B" letter-spacing="0.5">第二部分 · 本地 AI 智能模块</text>

  <!-- Page title -->
  <text x="80" y="90" font-family="Source Serif Pro, Georgia, serif" font-size="30" font-weight="700" fill="#1E293B">AI 安全哲学 — 建议缓冲区</text>
  <text x="80" y="118" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#64748B">AI 是顾问，不是操作员 — Human-in-the-Loop</text>
  <rect x="80" y="130" width="60" height="3" rx="1.5" fill="#059669"/>

  <!-- === CENTRAL FLOW DIAGRAM === -->

  <!-- Step 1: AI Engine -->
  <rect x="80" y="170" width="190" height="90" rx="12" fill="#F8FAFC" stroke="#7C3AED" stroke-width="1.5" filter="url(#shadow8)"/>
  <rect x="80" y="170" width="4" height="90" rx="2" fill="#7C3AED"/>
  <text x="175" y="205" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#7C3AED">AI 推理引擎</text>
  <text x="175" y="226" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#64748B">Ollama + Qwen2.5</text>
  <text x="175" y="246" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">CUSUM / DTW / Monod</text>

  <!-- Arrow 1 -->
  <line x1="270" y1="215" x2="320" y2="215" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowGrey)"/>
  <text x="295" y="207" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">生成</text>

  <!-- Step 2: Suggestion content -->
  <rect x="328" y="170" width="190" height="90" rx="12" fill="#F8FAFC" stroke="#059669" stroke-width="1.5" filter="url(#shadow8)"/>
  <rect x="328" y="170" width="4" height="90" rx="2" fill="#059669"/>
  <text x="423" y="201" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#059669">建议内容</text>
  <text x="423" y="224" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">参数值 + 置信度</text>
  <text x="423" y="246" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94A3B8">+ 推理依据</text>

  <!-- Arrow 2 -->
  <line x1="518" y1="215" x2="568" y2="215" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowGrey)"/>
  <text x="543" y="207" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">写入</text>

  <!-- Step 3: Buffer (highlighted, taller) -->
  <rect x="576" y="160" width="210" height="110" rx="14" fill="#F8FAFC" stroke="#D97706" stroke-width="2.5" filter="url(#shadow8)"/>
  <text x="681" y="192" text-anchor="middle" font-family="Source Serif Pro, Georgia, serif" font-size="17" font-weight="700" fill="#D97706">建议缓冲区</text>
  <rect x="626" y="202" width="110" height="28" rx="6" fill="#FEF3C7"/>
  <text x="681" y="222" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="15" font-weight="700" fill="#D97706">PENDING</text>
  <text x="681" y="252" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94A3B8">不执行，等待审核</text>

  <!-- Arrow 3 -->
  <line x1="786" y1="215" x2="836" y2="215" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowGrey)"/>
  <text x="811" y="207" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">展示</text>

  <!-- Step 4: Operator review -->
  <rect x="844" y="170" width="170" height="90" rx="12" fill="#F8FAFC" stroke="#1E40AF" stroke-width="2" filter="url(#shadow8)"/>
  <rect x="844" y="170" width="4" height="90" rx="2" fill="#1E40AF"/>
  <text x="929" y="201" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E40AF">操作员审核</text>
  <text x="912" y="228" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#059669">Accept</text>
  <text x="912" y="248" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#DC2626">Reject</text>

  <!-- Arrow Accept -> PLC -->
  <line x1="1014" y1="200" x2="1074" y2="200" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 5: PLC -->
  <rect x="1082" y="178" width="118" height="48" rx="10" fill="#F8FAFC" stroke="#059669" stroke-width="1.5" filter="url(#shadow8)"/>
  <text x="1141" y="208" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#059669">写入 PLC</text>

  <!-- Arrow Reject -> Log -->
  <line x1="1014" y1="240" x2="1074" y2="240" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>

  <!-- Reject log -->
  <rect x="1082" y="222" width="118" height="48" rx="10" fill="#F8FAFC" stroke="#DC2626" stroke-width="1" filter="url(#shadowSm8)"/>
  <text x="1141" y="251" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#DC2626">记录日志</text>

  <!-- RED LINE: AI does NOT connect to PLC directly -->
  <g transform="translate(80, 300)">
    <line x1="0" y1="0" x2="1120" y2="0" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.3"/>
    <rect x="400" y="-16" width="310" height="32" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="555" y="5" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#DC2626">AI 永不直接控制 PLC</text>
  </g>

  <!-- Audit trail card -->
  <rect x="80" y="360" width="1120" height="58" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow8)"/>
  <rect x="80" y="360" width="4" height="58" rx="2" fill="#1E40AF"/>
  <text x="104" y="385" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E293B">不可篡改审计日志</text>
  <text x="104" y="407" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">每次 Accept/Reject 操作均记录：操作员 ID / 时间戳 / 建议内容 / 置信度 / 决策结果 — 触发器禁止 UPDATE/DELETE</text>

  <!-- Comparison section title -->
  <text x="80" y="460" font-family="Source Serif Pro, Georgia, serif" font-size="17" font-weight="700" fill="#1E293B">设计哲学对比</text>

  <!-- Competitor card -->
  <rect x="80" y="478" width="530" height="70" rx="12" fill="#F8FAFC" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow8)"/>
  <rect x="80" y="478" width="5" height="70" rx="2" fill="#DC2626"/>
  <text x="108" y="504" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#DC2626">竞品模式</text>
  <text x="220" y="504" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">云端 AI 全自动闭环控制 — 延迟高、数据外泄风险</text>
  <text x="108" y="530" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94A3B8">AI 直连执行层，无人工确认环节</text>

  <!-- BIOCore card -->
  <rect x="670" y="478" width="530" height="70" rx="12" fill="#F8FAFC" stroke="#059669" stroke-width="1.5" filter="url(#shadow8)"/>
  <rect x="670" y="478" width="5" height="70" rx="2" fill="#059669"/>
  <text x="698" y="504" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#059669">BIOCore 模式</text>
  <text x="830" y="504" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">本地 AI 建议 + 人工确认 — 安全可控</text>
  <text x="698" y="530" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94A3B8">Human-in-the-Loop，AI 辅助决策不替代决策</text>

  <!-- Decorative background elements -->
  <g data-decorative="true">
    <circle cx="1240" cy="80" r="160" fill="#1E40AF" opacity="0.015"/>
    <circle cx="60" cy="660" r="120" fill="#059669" opacity="0.015"/>
  </g>

  <!-- Footer -->
  <rect x="0" y="680" width="1280" height="40" fill="#F1F5F9"/>
  <line x1="0" y1="680" x2="1280" y2="680" stroke="#E2E8F0" stroke-width="1"/>
  <text x="80" y="705" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">BIOCore 实验室发酵罐智能控制平台</text>
  <text x="640" y="705" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">AI 安全哲学</text>
  <text x="1200" y="705" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#94A3B8">08 / 18</text>
</svg>