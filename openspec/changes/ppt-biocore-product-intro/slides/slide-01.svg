<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="s1-bg-grad" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="s1-accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="60%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="s1-glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0"/>
    </linearGradient>
    <filter id="s1-shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="s1-glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#s1-bg-grad)"/>

  <!-- Decorative elements -->
  <g data-decorative="true">
    <!-- Subtle grid pattern -->
    <g opacity="0.04" stroke="#94A3B8" stroke-width="0.5">
      <line x1="0" y1="144" x2="1280" y2="144"/>
      <line x1="0" y1="288" x2="1280" y2="288"/>
      <line x1="0" y1="432" x2="1280" y2="432"/>
      <line x1="0" y1="576" x2="1280" y2="576"/>
      <line x1="256" y1="0" x2="256" y2="720"/>
      <line x1="512" y1="0" x2="512" y2="720"/>
      <line x1="768" y1="0" x2="768" y2="720"/>
      <line x1="1024" y1="0" x2="1024" y2="720"/>
    </g>
    <!-- Top-right glow -->
    <ellipse cx="1050" cy="180" rx="320" ry="280" fill="#1E40AF" opacity="0.05"/>
    <!-- Bottom-left glow -->
    <ellipse cx="200" cy="580" rx="260" ry="200" fill="#059669" opacity="0.04"/>
    <!-- Bioreactor silhouette -->
    <g transform="translate(920, 140)" opacity="0.07" fill="#94A3B8">
      <ellipse cx="100" cy="0" rx="75" ry="18"/>
      <rect x="25" y="0" width="150" height="280" rx="8"/>
      <ellipse cx="100" cy="280" rx="75" ry="18"/>
      <line x1="100" y1="20" x2="100" y2="250" stroke="#94A3B8" stroke-width="3" fill="none"/>
      <line x1="55" y1="120" x2="145" y2="120" stroke="#94A3B8" stroke-width="3" fill="none"/>
      <line x1="55" y1="180" x2="145" y2="180" stroke="#94A3B8" stroke-width="3" fill="none"/>
      <!-- Bubbles -->
      <circle cx="70" cy="220" r="4"/>
      <circle cx="120" cy="200" r="3"/>
      <circle cx="90" cy="240" r="5"/>
      <circle cx="130" cy="230" r="3"/>
    </g>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#s1-accent-line)"/>

  <!-- Main title block -->
  <text x="100" y="235" font-family="Source Serif Pro, Georgia, serif" font-size="52" font-weight="700" fill="#F8FAFC" letter-spacing="3">BIOCore</text>
  <text x="100" y="300" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="34" font-weight="600" fill="#CBD5E1" letter-spacing="1">实验室发酵罐智能控制平台</text>

  <!-- Accent divider -->
  <rect x="100" y="325" width="140" height="3" rx="1.5" fill="#1E40AF"/>
  <rect x="250" y="325" width="40" height="3" rx="1.5" fill="#059669"/>

  <!-- Subtitle -->
  <text x="100" y="370" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="17" fill="#94A3B8" letter-spacing="0.5">工业 PLC 可靠性 | 本地 AI 零云依赖 | 8 罐并行 | 成本 1/5</text>

  <!-- Four metric badges -->
  <g transform="translate(100, 420)">
    <!-- Badge 1: 100% Offline -->
    <rect x="0" y="0" width="220" height="80" rx="8" fill="#1E293B" stroke="#1E40AF" stroke-width="1" filter="url(#s1-shadow)"/>
    <text x="110" y="34" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700" fill="#1E40AF">100%</text>
    <text x="110" y="58" text-anchor="middle" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="14" fill="#94A3B8">离线 AI 运行</text>

    <!-- Badge 2: ISA-88 -->
    <rect x="240" y="0" width="220" height="80" rx="8" fill="#1E293B" stroke="#1E40AF" stroke-width="1" filter="url(#s1-shadow)"/>
    <text x="350" y="34" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700" fill="#1E40AF">ISA-88</text>
    <text x="350" y="58" text-anchor="middle" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="14" fill="#94A3B8">国际批次控制标准</text>

    <!-- Badge 3: 8 Tanks -->
    <rect x="480" y="0" width="220" height="80" rx="8" fill="#1E293B" stroke="#059669" stroke-width="1" filter="url(#s1-shadow)"/>
    <text x="590" y="34" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700" fill="#059669">8 罐</text>
    <text x="590" y="58" text-anchor="middle" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="14" fill="#94A3B8">单 PC 并行控制</text>

    <!-- Badge 4: 1/5 Cost -->
    <rect x="720" y="0" width="220" height="80" rx="8" fill="#1E293B" stroke="#059669" stroke-width="1" filter="url(#s1-shadow)"/>
    <text x="830" y="34" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700" fill="#059669">1/5</text>
    <text x="830" y="58" text-anchor="middle" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="14" fill="#94A3B8">竞品成本</text>
  </g>

  <!-- Tagline -->
  <text x="100" y="560" font-family="Source Serif Pro, Georgia, serif" font-size="16" font-style="italic" fill="#64748B">用工业级可靠性 + 本地 AI 智能 + 开放架构，以 1/5 成本提供专业级发酵控制</text>

  <!-- Bottom bar -->
  <rect x="0" y="678" width="1280" height="42" fill="#0F172A" opacity="0.8"/>
  <rect x="0" y="678" width="1280" height="1" fill="#1E40AF" opacity="0.3"/>
  <text x="100" y="704" font-family="Inter, Microsoft YaHei, system-ui, sans-serif" font-size="12" fill="#64748B">BIOCore 实验室发酵罐智能控制平台 | 产品介绍</text>
  <text x="1180" y="704" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#64748B">01 / 18</text>
</svg>