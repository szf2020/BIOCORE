  <text x="570" y="492" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700" fill="#DC2626">10 项检查</text>

  <!-- ==================== RIGHT SIDE: Layer Detail Cards ==================== -->
  <rect x="840" y="148" width="380" height="86" rx="12" fill="#F8FAFC" filter="url(#s6-shadow)" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="840" y="148" width="6" height="86" rx="3" fill="#DC2626"/>
  <text x="868" y="176" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#DC2626">Layer 1: 启动前互锁</text>
  <text x="868" y="200" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" fill="#1E293B">10 项</text>
  <text x="940" y="200" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748B">IL-01 ~ IL-10</text>
  <text x="868" y="220" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">启动前必须全部通过</text>

  <rect x="840" y="250" width="380" height="86" rx="12" fill="#F8FAFC" filter="url(#s6-shadow)" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="840" y="250" width="6" height="86" rx="3" fill="#F59E0B"/>
  <text x="868" y="278" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#F59E0B">Layer 2: 运行故障监测</text>
  <text x="868" y="302" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" fill="#1E293B">11 项</text>
  <text x="940" y="302" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748B">RF-01 ~ RF-11</text>
  <text x="868" y="322" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">温度/pH/DO/罐压/搅拌/通讯...</text>

  <rect x="840" y="352" width="380" height="76" rx="12" fill="#F8FAFC" filter="url(#s6-shadow)" stroke="#059669" stroke-width="1.5"/>
  <rect x="840" y="352" width="6" height="76" rx="3" fill="#059669"/>
  <text x="868" y="380" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#059669">Layer 3: 双向心跳</text>
  <text x="868" y="404" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" fill="#1E293B">3 秒</text>
  <text x="930" y="404" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748B">超时自动保护</text>

  <rect x="840" y="444" width="380" height="76" rx="12" fill="#F8FAFC" filter="url(#s6-shadow)" stroke="#1E40AF" stroke-width="1.5"/>
  <rect x="840" y="444" width="6" height="76" rx="3" fill="#1E40AF"/>
  <text x="868" y="472" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E40AF">Layer 4: PLC 独立安全</text>
  <text x="868" y="496" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748B">PC 完全失联仍保持关键控制</text>

  <rect x="840" y="536" width="380" height="76" rx="12" fill="#F8FAFC" filter="url(#s6-shadow)" stroke="#8B5CF6" stroke-width="1.5"/>
  <rect x="840" y="536" width="6" height="76" rx="3" fill="#8B5CF6"/>
  <text x="868" y="564" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#8B5CF6">Layer 5: AI 建议缓冲区</text>
  <text x="868" y="588" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748B">AI 永不直接控制 PLC</text>

  <!-- ==================== Bottom: Compliance Badge ==================== -->
  <rect x="840" y="628" width="380" height="38" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="1030" y="652" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1E40AF">= IEC 61511 SIL 1 同等保护深度</text>

  <!-- ==================== Footer ==================== -->
