  <text x="80" y="706" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">BIOCore 实验室发酵罐智能控制平台</text>
  <text x="640" y="706" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748B">5 层安全防护体系</text>
  <text x="1200" y="706" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#94A3B8">06 / 18</text>
</svg>