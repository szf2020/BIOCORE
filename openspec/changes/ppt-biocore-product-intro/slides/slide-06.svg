<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="s6-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="s6-accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="s6-layer1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="s6-layer2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="s6-layer3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="s6-layer4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="s6-layer5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="s6-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
    <filter id="s6-shadow-sm">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#s6-bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#s6-accent-bar)" data-decorative="true"/>

  <!-- Part indicator -->
  <rect x="80" y="28" width="4" height="24" rx="2" fill="#1E40AF"/>
  <text x="96" y="46" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B" letter-spacing="0.5">第一部分 | 工业级硬件底座与安全体系</text>

  <!-- Page title -->
  <text x="80" y="88" font-family="Source Serif Pro, Georgia, serif" font-size="28" font-weight="700" fill="#1E293B">5 层安全防护体系</text>
  <text x="80" y="114" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#64748B">从启动互锁到 AI 建议缓冲 &#x2014; 层层递进的纵深防御</text>
  <rect x="80" y="126" width="60" height="3" rx="1.5" fill="#059669"/>

  <!-- ==================== MAIN CARD: Nested Layer Diagram ==================== -->
  <rect x="60" y="148" width="760" height="490" rx="12" fill="#F8FAFC" filter="url(#s6-shadow)" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Layer 5 (outermost) -->
  <rect x="90" y="168" width="700" height="450" rx="14" fill="url(#s6-layer5)" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
  <text x="112" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#8B5CF6">Layer 5</text>
  <text x="180" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">AI 建议缓冲区 &#x2014; Human-in-the-Loop</text>

  <!-- Layer 4 -->
  <rect x="120" y="204" width="640" height="394" rx="12" fill="url(#s6-layer4)" stroke="#1E40AF" stroke-width="1.5" opacity="0.7"/>
  <text x="142" y="226" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#1E40AF">Layer 4</text>
  <text x="210" y="226" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">PLC 独立安全程序 &#x2014; 最终防线</text>

  <!-- Layer 3 -->
  <rect x="150" y="240" width="580" height="338" rx="10" fill="url(#s6-layer3)" stroke="#059669" stroke-width="1.5" opacity="0.7"/>
  <text x="172" y="262" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#059669">Layer 3</text>
  <text x="240" y="262" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">双向心跳通讯安全 &#x2014; 3 秒超时</text>

  <!-- Layer 2 -->
  <rect x="180" y="276" width="520" height="282" rx="10" fill="url(#s6-layer2)" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
  <text x="202" y="298" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#F59E0B">Layer 2</text>
  <text x="264" y="298" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">运行故障监测 (RF-01~RF-11)</text>

  <!-- Layer 1 (innermost - core) -->
  <rect x="210" y="316" width="460" height="220" rx="10" fill="#FFFFFF" stroke="#DC2626" stroke-width="2" filter="url(#s6-shadow-sm)"/>
  <text x="240" y="344" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#DC2626">Layer 1 &#x2014; 核心</text>
  <text x="240" y="368" font-family="Source Serif Pro, Georgia, serif" font-size="16" font-weight="600" fill="#1E293B">启动前互锁 (IL-01~IL-10)</text>

  <!-- Interlock items grid inside Layer 1 -->
  <rect x="240" y="386" width="100" height="30" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="290" y="406" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626">传感器</text>
  <rect x="350" y="386" width="100" height="30" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="400" y="406" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626">VFD 变频器</text>
  <rect x="460" y="386" width="100" height="30" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="510" y="406" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626">急停开关</text>
  <rect x="570" y="386" width="80" height="30" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="610" y="406" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626">盖锁</text>

  <rect x="240" y="424" width="100" height="30" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="290" y="444" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626">蒸汽</text>
  <rect x="350" y="424" width="100" height="30" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="400" y="444" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626">心跳</text>
  <rect x="460" y="424" width="100" height="30" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="510" y="444" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626">校准</text>
  <rect x="570" y="424" width="80" height="30" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="610" y="444" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626">冷却</text>

  <rect x="240" y="462" width="100" height="30" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="290" y="482" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626">配方</text>
  <rect x="350" y="462" width="100" height="30" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="400" y="482" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#DC2626">报警复位</text>

  <!-- Total count badge inside Layer 1 -->
