# BIOCore Observability Profile (T44 — Sprint 4 Track A)
# 可选加强包：Prometheus 抓 biocore-server 的 /api/v1/admin/metrics + Grafana 看板
#
# 启动 (与基础 compose 合并):
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml \
#     --profile observability up -d
#
# Grafana 默认登录: admin / biocore_admin
# Grafana URL:  http://localhost:3002
# Prometheus URL: http://localhost:9090
# 端口避开 BIOCore (3001) / web-ui (3000) / InfluxDB (8086)

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: biocore-prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.2
    container_name: biocore-grafana
    profiles: ["observability"]
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=biocore_admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
