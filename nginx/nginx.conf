# BIOCore × FUXA W3 — nginx 反代 + JWT SSO
# 浏览器仅访问 nginx:8080. FUXA 1881 不暴露 host port (W3 完整模式).
# 开发模式: BIOCore web-ui (3000) + server (3001) 仍在 host 跑, 通过 host.docker.internal 反代.
# 生产模式: 全部容器化时改 upstream 为容器名.

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;

  # macOS/Windows Docker Desktop: host.docker.internal 解析宿主
  # Linux 生产: 改为 biocore-web/biocore-server 容器名 + 同 docker network
  upstream biocore_web { server host.docker.internal:3000; keepalive 16; }
  upstream biocore_api { server host.docker.internal:3001; keepalive 16; }
  # 开发期: 通过 host.docker.internal 反代 fuxa (需 fuxa 容器保留 1881 host port)
  # 生产期: 改为 biocore-fuxa:1881 + user-defined network
  upstream fuxa        { server host.docker.internal:1881; keepalive 16; }

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # 大消息上传 (配方导入 / 报告生成)
  client_max_body_size 50M;

  server {
    listen 8080 default_server;
    server_name _;

    # ───── BIOCore web-ui (主入口) ─────
    location / {
      proxy_pass http://biocore_web;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ───── BIOCore REST API ─────
    location /api/ {
      proxy_pass http://biocore_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # SSE/长连接支持
      proxy_buffering off;
      proxy_read_timeout 600s;
    }

    # ───── BIOCore WebSocket ─────
    location /ws {
      proxy_pass http://biocore_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    # ───── Swagger 文档 ─────
    location /docs {
      proxy_pass http://biocore_api;
      proxy_set_header Host $host;
    }

    # ───── FUXA HMI (JWT 守护) ─────
    location /fuxa/ {
      auth_request /__verify;            # 先校验 BIOCore JWT cookie
      error_page 401 = @auth_redirect;   # 未授权重定向到 BIOCore login

      # 去掉 /fuxa 前缀转发到 FUXA
      rewrite ^/fuxa/(.*)$ /$1 break;
      proxy_pass http://fuxa;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ───── auth_request 内部端点 ─────
    # 透传 Cookie + Authorization, BIOCore middleware 接受任一来源 (cookie biocore_token / Bearer header / X-API-Key)
    location = /__verify {
      internal;
      proxy_pass http://biocore_api/api/v1/auth/verify;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Cookie $http_cookie;
      proxy_set_header Authorization $http_authorization;
    }

    # ───── 未授权重定向 ─────
    location @auth_redirect {
      return 302 /login?redirect=$request_uri;
    }

    # ───── 健康检查 ─────
    location = /__nginx_health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}
