# BIOCore — nginx 反代 + JWT SSO (统一 compose 生产模式)
# 浏览器仅访问 nginx:8080. 所有 upstream 走 biocore-net user-defined network 容器名互访.
# biocore-server 同时托管 web-ui 静态资源 + REST API + WS (Next.js standalone build).
# 启动: docker compose --profile production up -d

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;

  # M4 生产配置: 全部走 biocore-net 容器名 (无 host.docker.internal 依赖)
  # 注: biocore-server 单容器同时提供 web-ui 静态 + API + WS (3001)
  upstream biocore_web { server host.docker.internal:3001; keepalive 16; }   # 方案 A: server 走宿主机 dev 进程
  upstream biocore_api { server host.docker.internal:3001; keepalive 16; }

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # 大消息上传 (配方导入 / 报告生成)
  client_max_body_size 50M;

  server {
    listen 8080 default_server;
    server_name _;

    # ───── BIOCore web-ui (主入口) ─────
    location / {
      proxy_pass http://biocore_web;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ───── BIOCore REST API ─────
    location /api/ {
      proxy_pass http://biocore_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # SSE/长连接支持
      proxy_buffering off;
      proxy_read_timeout 600s;
    }

    # ───── BIOCore WebSocket ─────
    location /ws {
      proxy_pass http://biocore_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    # ───── Swagger 文档 ─────
    location /docs {
      proxy_pass http://biocore_api;
      proxy_set_header Host $host;
    }

    # ───── auth_request 内部端点 ─────
    # 透传 Cookie + Authorization, BIOCore middleware 接受任一来源 (cookie biocore_token / Bearer header / X-API-Key)
    location = /__verify {
      internal;
      proxy_pass http://biocore_api/api/v1/auth/verify;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Cookie $http_cookie;
      proxy_set_header Authorization $http_authorization;
    }

    # ───── 未授权重定向 ─────
    location @auth_redirect {
      return 302 /login?redirect=$request_uri;
    }

    # ───── 健康检查 ─────
    location = /__nginx_health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ───── Prometheus stub_status (M4 监控接入) ─────
    # 仅给 nginx-exporter 抓取, 不外露; access_log 关掉避免噪音
    # nginx-exporter (docker-compose.observability.yml) 通过容器名 biocore-nginx:8080 访问
    location = /stub_status {
      stub_status on;
      access_log off;
      # 仅允许 docker bridge 内网段; 生产可收紧到 nginx-exporter 容器 IP
      allow 172.16.0.0/12;
      allow 10.0.0.0/8;
      allow 192.168.0.0/16;
      allow 127.0.0.1;
      deny all;
    }
  }
}
