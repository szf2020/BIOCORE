# BIOCore — nginx 生产反代 + TLS
# SP-FX-37 新建, 不覆盖 nginx.conf (开发配置)
#
# SSL 证书放置:
#   ./nginx/ssl/cert.pem  (Let's Encrypt fullchain.pem 或自签)
#   ./nginx/ssl/key.pem   (Let's Encrypt privkey.pem 或自签)
#
# 详见 docs/deployment.md — SSL 证书申请指南

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # ─── 上游服务 (biocore-prod-net 容器名互访) ───────────────────
  upstream biocore_server {
    server biocore-server-prod:3001;
    keepalive 16;
  }

  # ─── gzip 压缩 ────────────────────────────────────────────────
  gzip on;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;
  gzip_min_length 1024;

  # ─── 日志格式 ─────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ─── 大文件上传 (backup restore) ─────────────────────────────
  client_max_body_size 100M;

  # ─── HTTP → HTTPS 重定向 ──────────────────────────────────────
  server {
    listen 80 default_server;
    server_name _;

    # 健康检查直接 200 (load balancer probe / docker healthcheck)
    location = /__nginx_health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── HTTPS 主服务器 ───────────────────────────────────────────
  server {
    listen 443 ssl http2 default_server;
    server_name _;

    # TLS 证书 (volume mount: ./nginx/ssl → /etc/nginx/ssl)
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # 仅 TLS 1.2 / 1.3
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (1 年)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # 其他安全头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # ─── SSE 推流 (scada, events) — proxy_buffering off ─────────
    location /api/v1/scada/sse/ {
      proxy_pass http://biocore_server;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # SSE 必须关闭缓冲
      proxy_buffering off;
      proxy_cache off;
      add_header X-Accel-Buffering no;
      proxy_read_timeout 3600s;
    }

    # ─── WebSocket 升级 ──────────────────────────────────────────
    location /ws/ {
      proxy_pass http://biocore_server;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
    }

    # ─── REST API (含 SSE /api/v1/events) ───────────────────────
    location /api/ {
      proxy_pass http://biocore_server;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # 长连接支持 (AI report, batch export 等)
      proxy_buffering off;
      proxy_read_timeout 600s;
    }

    # ─── Next.js Web UI (/) ──────────────────────────────────────
    location / {
      proxy_pass http://biocore_server;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── nginx 自身健康检查 ───────────────────────────────────────
    location = /__nginx_health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ─── Prometheus stub_status (监控用, 限内网) ─────────────────
    location = /stub_status {
      stub_status on;
      access_log off;
      allow 172.16.0.0/12;
      allow 10.0.0.0/8;
      allow 192.168.0.0/16;
      allow 127.0.0.1;
      deny all;
    }
  }
}
