# BIOCore × FUXA 统一 Compose (M4)
# 单文件管理所有服务: biocore-server + influxdb (核心) + mosquitto + nginx (生产)
# FUXA 已迁移到 monorepo (packages/fuxa, native node), 不再走 docker.
# 通过 profiles 控制启动范围:
#   docker compose up -d                       # 仅核心 (biocore-server + influxdb)
#   docker compose --profile hmi up -d         # 核心 + mosquitto (开发期 MQTT 桥接)
#   docker compose --profile production up -d  # 完整栈含 nginx 反代 (生产单入口 8080)
#
# 生命周期联动 (depends_on healthcheck):
#   biocore-server ← influxdb (healthy)
#   nginx          ← biocore-server (healthy)
#
# 网络: 所有容器加入 user-defined bridge `biocore-net`, 通过容器名互访.
# Hardened for 7×24 production runs (Sprint 4 Track A, T24)

services:
  influxdb:
    image: influxdb:2.7
    container_name: biocore-influxdb
    networks:
      - biocore-net
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=biocore123
      - DOCKER_INFLUXDB_INIT_ORG=biocore
      - DOCKER_INFLUXDB_INIT_BUCKET=fermentation
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=biocore-dev-token
      - DOCKER_INFLUXDB_INIT_RETENTION=365d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8086/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  biocore-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: biocore-server:local
    container_name: biocore-server
    restart: unless-stopped
    networks:
      - biocore-net
    depends_on:
      influxdb:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      # Runtime-guard 加固 (T22-T23)
      - NODE_OPTIONS=--max-old-space-size=2048
      - BIOCORE_OOM_THRESHOLD_MB=auto
      - BIOCORE_OOM_GRACE_SAMPLES=3
      - BIOCORE_DIAGNOSTIC_DUMP_DIR=/app/crashes
      - BIOCORE_DIAGNOSTIC_KEEP_LAST=50
      - NODE_ENV=production
      # InfluxDB 连接
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=biocore-dev-token
      - INFLUX_ORG=biocore
      - INFLUX_BUCKET=fermentation
      # SQLite 路径 (映射到 host volume)
      - DATA_DIR=/app/data
      - SQLITE_PATH=/app/data/biocore.db
      # MQTT broker (hmi/production profile 启 mosquitto 时连容器, 否则可缺省)
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtt://mosquitto:1883}
      # PORT
      - PORT=3001
      # 生产部署前必须设为 false（默认从 .env 读，未设为 false 时上方 env 优先）
      - MOCK_PLC=${MOCK_PLC:-false}
    volumes:
      - ./crashes:/app/crashes
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.mjs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  # ───── MQTT Broker (FUXA ↔ BIOCore 数据桥) ─────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: biocore-mosquitto
    profiles: ["hmi", "production"]
    restart: unless-stopped
    networks:
      - biocore-net
    ports:
      - "1883:1883"   # MQTT TCP (BIOCore server + FUXA 连)
      - "9001:9001"   # MQTT WebSocket (浏览器端可选)
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ───── FUXA HMI (SCADA 可视化) ─────
  # 方案 A: FUXA 已迁移到 monorepo packages/fuxa, 通过 pnpm dev 启动 native node.
  # Docker 服务移除. 端口仍 1881 (主机直接监听).
  # 数据保留: ./fuxa/{appdata,db,images,logs} (软链接挂在 packages/fuxa/server/_*).
  # 历史镜像: frangoteam/fuxa:1.3.2-2809.

  # ───── nginx 反代 + JWT SSO (生产单入口) ─────
  # 浏览器统一入口 http://localhost:8080
  # / → biocore-server :3001 (静态 + API + WS), /fuxa/ → biocore-fuxa:1881 (含 auth_request)
  nginx:
    image: nginx:alpine
    container_name: biocore-nginx
    profiles: ["production"]
    restart: unless-stopped
    networks:
      - biocore-net
    depends_on:
      biocore-server:
        condition: service_healthy
      # fuxa 已迁出 docker (方案 A), nginx 通过 host.docker.internal:1881 反代
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/__nginx_health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  biocore-net:
    name: biocore-net
    driver: bridge

volumes:
  influxdb_data:
  influxdb_config:
